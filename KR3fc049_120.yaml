body:
  text: 此所謂遞兼之數也欲求總數若干及每次分數各若干法分二條法以所設物數減一數為倍根之次數乃以一為根倍之加一得三為一次又倍之加一得七為二次如是纍倍纍加一至如其次數而止其末得之數即相兼之總數也法又以所設物數即為各立一數之數減一數為三角堆之根乃以根數求得平三角堆為二物相兼之數又減一數求得立三角堆為三物相兼之數又減一數求得三乘三角堆為四物相兼之數如是根數遞減乘數遞加求得相兼諸數至於中數而止中數以後即同於前不煩覆算中數之位於原設物數減去最大一數取其餘數之中餘數奇則有一中耦則有二中有二中者二相兼數亦同此遞兼之分數也今以十物為圖解於後推之百千萬億莫不同符抑一理歟十物遞兼總數圖解解曰加一數者今設
