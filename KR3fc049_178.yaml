body:
  text: 視中率多於根數以中率自乘數減去方法餘為帶縱平方積根數反減中率餘為帶縱平方長闊和帶縱平方長闊和法開之得長闊二根各以幾二乘方數除之得數又各為帶縱平方積以幾二乘方數除幾一乘方數又為帶縱平方長闊和帶縱平方長闊和法開之各得長根為每根之數凡得兩數者其計原真數皆合也若中率少於根數法在本條無中率與根數恰合者
