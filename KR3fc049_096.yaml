body:
  text: 所截於外者必為連比例之三率五分之三通弴中一截少於五分之一通弴之數必為連比例之四率蓋前與半徑平行線於小三角形內截成一又小三角形此形一角為半徑與五分之三通弴相交之角此角緣二通弴平行半徑之交之也必成相等之角故即為五分之一之半外角一角為與又一端之半徑平行線與五分之三通弴相交之角兩半徑之交通弴也形內外之角恆相等此線既與之平行故此角亦為五分之一半外角夫三角形二角等者三角必等故又小三角形亦為與大三角形同式之形夫半徑大三角形之要也五分之一之通弴大三角形之底而小三角形之要也半徑為五分之三通弴所截於外者則小三角形之底而又小三角形之要也五分之三通弴中一截少於五分之一通弴之數又小三角形之底也要底相禪比例必連故以半徑為一率五分之一通弴為二率自合以半徑為五分之三通弴所
