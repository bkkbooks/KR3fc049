body:
  text: 所截於外者必爲連比例之三率五分之三通弴中一截少於五分之一通弴之數必爲連比例之四率葢前與半徑平行綫於小三角形內截成一又小三角形此形一角爲半徑與五分之三通弴相交之角此角緣二通弴平行半徑之交之也必成相等之角故卽爲五分之一之半外角一角爲與又一端之半徑平行綫與五分之三通弴相交之角兩半徑之交通弴也形內外之角恒相等此綫旣與之平行故此角亦爲五分之一半外角夫三角形二角等者三角必等故又小三角形亦爲與大三角形同式之形夫半徑大三角形之要也五分之一之通弴大三角形之底而小三角形之要也半徑爲五分之三通弴所截於外者則小三角形之底而又小三角形之要也五分之三通弴中一截少於五分之一通弴之數又小三角形之底也要底相禪比例必連故以半徑爲一率五分之一通弴爲二率自合以半徑爲五分之三通弴所
