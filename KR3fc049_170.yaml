body:
  text: 之數共為通分法之三母三數之計原真數皆合也然或為長闊和之數過少折半自乘尚不及其為帶縱平方積之數則即無三數相淆其真一根之數即為可知者巳其以所命幾一乘方數折半為假一根之數以其數自乘與所命幾根數相較而少於幾根數即取減餘根數又以假一根之數乘之與所命幾真數相較而見多於幾真數者則又以所命幾一乘方數三分之一為假一根之數如前法較而視之如其恰合則真一根即三分之一矣如其或多或少則復以前折半法見多相較餘真數命為幾真數前折半法相較餘根數命為幾根數前折半法假一根之數命為幾一乘方數共命為一二乘方積少幾一乘方積多幾根積與幾真數相等仍用前折半法更折半較而視之總以見少而止即用前法求得真一根之數與原假一根之數相減餘即得原真一根之數其求有無三數
