body:
  text: 有兩句𢎺較求等積兩句股形相等之句𢎺和法曰以兩句𢎺較相椉開方得中率中率與兩句𢎺較相併得數爲等積兩句股形共得之句𢎺和數有等積等高闊和數求兩帶縱扁立方形諸數一長立方高闊和一扁立方高闊和相等法同法曰命積爲帶縱長立方積以高闊和爲所帶之縱用帶縱長立方法開得本方根爲兩形高數之中率中率與高闊和相減餘爲帶縱平方之長闊和中率自椉爲帶縱平方積用帶縱平方長闊和法開之得長闊二根爲兩形之兩高數兩高與和相減爲兩闊數理解竝同等積等句𢎺和兩句股法有股𢎺和句股積求諸數法曰如前兩句𢎺和相等兩句股積相等法求得闊根卽爲股𢎺較用股𢎺較與股𢎺和求句股𢎺法卽得諸數解曰準前論等積等𢎺和得有兩形由𢎺和中
  hash: sha256:42d47dcda7fc7c47bd0b2d5b4120982ab810acf2236a341709d93d9e566000eb
