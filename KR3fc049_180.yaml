body:
  text: 南嶽之遊塗次白酒岡雨三晝夜不得道茅簷聽滴如在書窗共話時感遙情無盡之端理幽談未竟之緒更為此册算書時同行者家石潭使人張明及其子柴車夫二人車一座馬一匹同寓者説因果一人弄幻術三人女媒一人車夫二人車一座或歌或歎如夢如癡我孟嘉此際望雲長嘯亦念秋風葉飄泊何所耶歙汪萊
