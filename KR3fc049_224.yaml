body:
  text: 間多導者統按二十二條之理索之即得定進退凡初商除實不盡或翻為他實或益為多實至求次商遞變內通行為同名者退不者進入諸商列原題方根為法真數為實令法在上實在下如設題式初商乘上層同名相加異名相減以入於次層復乘既入之次層遞入於下層下層減盡則無次商不盡復列原題上層初商既入實為下層中間以初商數如初商法入於初商既入之次層近下者一入轉而上遞加一入畢入厠列之為變題如初商法入次商視三商之有無及入之如次商之於初商也諸商統於此求次數既得一數無奇零合諸商數於原題內如初商法入之變題恆省下一層降其位通行同名即無次數異名不相糅即仍有一數異名相糅審有無如前有則重求之若初得數奇零不盡各
