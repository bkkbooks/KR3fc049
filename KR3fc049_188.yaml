body:
  text: 會乎至五分取一之法為之借根乃成一四乘方多五萬萬萬萬萬萬萬根少五百萬萬萬二乘方與幾真數相等而所少五百萬萬萬二乘方積必多於一四乘方積於是相淆之數至多如一四乘方多七十四根少十五二乘方與六十真數等則一二三等數皆合則惟以本數限進退設數按率加減而求其合斯為條理井然故所著第三册之法取塗自别也又論曰西人杜德美有隨度求弴矢捷法梅氏赤水遺珍載之未備戊唇冬效力史館協修朱君雲路出示所藏乃覩德美全法竭旬日思得其立法之原歎為至妙姑舉一隅於此如通弧求通弴以通弧本數為第一條次以半徑為連比例第一率通弧本數為第二率二率自乘一率除之得第三率次置第一條以三率乘之一率除之得第四率四除之又二除之三除之為第二條應減此所減者四率二十四分之一也何以減二十四分之一緣三全分通弴較三分之一三通弴併數少一四率若併三分之一三
