body:
  text: 會乎至五分取一之法爲之借根迺成一四乘方多五萬萬萬萬萬萬萬根少五百萬萬萬二乘方與幾眞數相等而所少五百萬萬萬二乘方積必多於一四乘方積於是相淆之數至多如一四乘方多七十四根少十五二乘方與六十眞數等則一二三等數皆合則惟以本數限進退設數按率加減而求其合斯爲條理井然故所著第三冊之法取塗自别也又論曰西人杜德美有隨度求弴矢捷法梅氏赤水遺珍載之未備戊唇冬効力史館協修朱君雲路出示所藏乃覩德美全法竭旬日思得其立法之原歎爲至妙姑舉一隅於此如通弧求通弴以通弧本數爲第一條次以半徑爲連比例第一率通弧本數爲第二率二率自乗一率除之得第三率次置第一條以三率乗之一率除之得第四率四除之又二除之三除之爲第二條應減此所減者四率二十四分之一也何以減二十四分之一縁三全分通弴較三分之一三通弴併數少一四率若併三分之一三
