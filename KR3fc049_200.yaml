body:
  text: 三例以明孝嬰之書之所以然于是秦李兩家之學至此益明今年村居教徒稀入城市出入于農圃醫卜之術秋八月有走馬來者叩門甚迫童子驚相告豫視之則孝嬰也延入孰中對飮于豆花蛬語間孝嬰謂豫日或謂尚之誚吾所著書有之乎豫因出尚之所為簷齋算學跋與之孝嬰怡然曰尚之固不我非也因謂豫曰子亦為我一言豫諾之孝嬰復走馬去門人請日秦李之書李君疏之汪君難之不已異乎豫日此兩君所以是也兩漢經生守一家之言華薻鞶帨通人鄙其固焉鄭康成為禮經作注雖子夏之言勻駮之秦越人宗岐伯之言而作八十一難蓋非深入其室者不能疏亦非深入其室者不能難得李君之疏而秦李之書明得汪君之難而秦李之書益明古人立言固樂夫人之深入而難我不樂人之略觀大意而諂附我也門人退録之以寄孝嬰即以為之言嘉慶癸亥中秋前一日江都焦循記
  hash: sha256:8bde83972cf60b7fa2f9799ddb17d0ac853070a15eb9674940a4c2fabfc3b894
