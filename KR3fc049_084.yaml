body:
  text: 等𢎺和之兩𢎺較及𢎺和絲豪無異而連三率之理首率過三率併數之半者其餘中末併數尚不及半何況末率帶縱長立方之法則高必過高闊和之半斷無在半以下之事故首末二率其一為長立方之高者其一必為扁立方之高三率併數此形為長立方之高闊和者等積之彼形必為扁立方之高闊和不至有兩積相等兩長立方高闊和相等之相淆而扁立方高闊和與積有求得長根變為長立方之高者亦不至有等積等扁立方高闊和之互易矣又前法之求兩高既以長闊二根則長立方之高過高闊和之半者自當長根故以長根得立方高也論曰句股形等積等𢎺和帶縱立方形等積等高闊和皆有兩形互易雖股𢎺和所通在句𢎺和長立方所通在扁立方幸有名之可辨然其數莫不由兩形相引而出至如句𢎺和有時所通亦句𢎺和句二十股二十一𢎺二十九句𢎺和四十九句股積二百一十句十
