body:
  text: 今此兩根之方積一以首率椉三率併數一以末率椉三率併數其長皆同以三率併數則其差分惟在闊之首末二率矣若以首中併數爲根自椉得方積則其中有首率自椉一首率椉中率二中率自椉一同於首率椉末率一以首率齊之則首率爲闊首末中中四率併數爲長以中末併數爲根自椉得方積則其中有末率自椉一末率椉中率二中率自椉一同於末率椉首率一以末率齊之則末率爲闊亦首末中中四率併數爲長兩積之差分亦惟在首末二率是此兩方積與彼兩方積比例等矣積之比例旣等根之比例有不等乎故必成四率斷比例也凡斷比例四率若交互椉之其積必等今句𢎺和內減去句𢎺較其餘卽爲
  hash: sha256:8f8e01d7ff04168da0aec821726e940a4c88467082da2685c9f5cb8e5bb0e8bc
