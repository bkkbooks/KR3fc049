body:
  text: 今此兩根之方積一以首率乘三率併數一以末率乘三率併數其長皆同以三率併數則其差分惟在闊之首末二率矣若以首中併數為根自乘得方積則其中有首率自乘一首率乘中率二中率自乘一同於首率乘末率一以首率齊之則首率為闊首末中中四率併數為長以中末併數為根自乘得方積則其中有末率自乘一末率乘中率二中率自乘一同於末率乘首率一以末率齊之則末率為闊亦首末中中四率併數為長兩積之差分亦惟在首末二率是此兩方積與彼兩方積比例等矣積之比例既等根之比例有不等乎故必成四率斷比例也凡斷比例四率若交互乘之其積必等今句弦和內減去句弦較其餘即為
