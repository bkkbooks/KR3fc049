body:
  text: 一有幾二乘方積多幾根積與幾一乘方積相等左右降位命為幾一乘方積多幾真數與幾根積相等不可知同第五一有幾二乘方積少幾根積與幾一乘方積相等左右降位命為幾一乘方積少幾真數與幾根積相等可知同第一一有幾二乘方積多幾一乘方積與幾真數相等可知同第八一有幾二乘方積少幾一乘方積與幾真數相等可知同第七一有幾二乘方積多幾一乘方積與幾根積相等左右降位命為幾一乘方積多幾根積與幾真數相等可知同第二一有幾二乘方積少幾一乘方積與幾根積相等左右降位命為幾一乘方積少幾根積與幾真數相等可知同第一一有幾真數多幾根積又多幾一乘方積與幾二乘方積相等以幾一乘方數為帶縱扁立
