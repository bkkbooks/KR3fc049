body:
  text: 第五十一條補法既以幾一乘方數用幾二乘方數除之以乘幾根數與原幾真數相較而多於原幾真數之後則取原幾一乘方數幾根數幾真數皆以幾二乘方數除之總命為一二乘方積少幾一乘方積多幾根積與幾真數相等於是以此所命幾一乘方數折半為假一根之數以其數自乘與所命幾根數相較視少於幾根數則即取減餘根數又以假一根之數乘之與所命幾真數相較如其恰合則真一根即折半之數矣若見少於幾真數即以此相較餘真數命為帶縱長立方積相減餘根數命為方法假一根之數命為帶縱長立方高闊較帶縱長立方有帶方法開之得高根為真一根之數以此真一根之數除所命幾真數為帶縱平方積真一根之數與所命幾一乘方數相減餘為帶縱平方長闊和帶縱平方長闊和法開之得長闊兩根與前真一根
