body:
  text: 十物合并得數一解曰推遞兼之分數用三角堆其說有五一系以一物爲主而兼他物得若干數至以又一物爲主而兼他物卽不復兼先爲主之物故所得必少一數由此遞少遂成三角堆形一系以一物爲主而兼他物得若干數至以二物爲主而兼他物受兼之物已減爲主之一故所得必少一數由此遞少故根數遞減一系一物爲主而兼他物成一根各物遞減而進成一平三角堆至二物爲主則此物與彼物相與爲二物以兼他物成一根此物與彼又一物又相與爲二物以兼他物又成一根由此遞減而進則一物爲主已成平三角堆各物遞減而進遂成立三角堆由此遞進故乘數遞加一系中數之前後其前相兼之數與後不及兼之數等故得數等一系中數在一物各立一數及一物不及兼之中故各物合并之一位不計設如設如筮者求卦每一卦六爻自一爻變以至六
