body:
  text: 第五十一條補法旣以幾一乘方數用幾二乘方數除之以乘幾根數與原幾眞數相較而多於原幾眞數之後則取原幾一乘方數幾根數幾眞數皆以幾二乘方數除之總命爲一二乘方積少幾一乘方積多幾根積與幾眞數相等於是以此所命幾一乘方數折半爲假一根之數以其數自乘與所命幾根數相較視少於幾根數則卽取減餘根數又以假一根之數乘之與所命幾眞數相較如其恰合則眞一根卽折半之數矣若見少於幾眞數卽以此相較餘眞數命爲帶縱長立方積相減餘根數命爲方法假一根之數命爲帶縱長立方高闊較帶縱長立方有帶方法開之得高根爲眞一根之數以此眞一根之數除所命幾眞數爲帶縱平方積眞一根之數與所命幾一乘方數相減餘爲帶縱平方長闊和帶縱平方長闊和法開之得長闊兩根與前眞一根
