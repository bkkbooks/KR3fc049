body:
  text: 倍句句𢎺較椉句𢎺和開方得股是句𢎺和爲三率併數之象兩積相等之兩句𢎺較爲首率與末率之象兩積相等之兩倍句爲首中併數及中末併數之象兩積相等兩句𢎺較之併數與句𢎺和相減餘必爲中率之象兩積相等之兩股一爲首率與三率併數相椉開方之象一爲末率與三率併數相椉開方之象而首率所得之股其倍句必爲中末二率末率所得之股其倍句必爲中首二率於四率斷比例中皆爲斜對然後相椉之積必等矣故句𢎺和中截此形句𢎺較爲首率其餘倍句爲中末併數以首率椉中末併數有一首率椉中率長方有一首率椉末率長方同於中率自椉之方兩方相就成中率爲闊首率爲帶縱之長方矣故以此形句𢎺較椉倍句爲帶縱平方積句𢎺較爲所帶之縱用帶縱平方法開得闊根卽爲兩積相等兩句𢎺較之中率以減倍句得末率卽爲彼形之句𢎺較也
