body:
  text: 對之邊凡本形之外角爲次形邊卽以其邊所對角之外角爲本形角所對之邊法以半徑自椉爲一率所求邊㫄兩角餘割綫相椉爲二率併邊㫄兩角較半周餘弧之矢與對角矢相減餘爲三率求得四率爲所求邊之矢或以邊㫄兩角相減餘弧之矢與對角外角之矢相減餘爲三率求得四率爲所求邊較半周餘弧之矢得一邊再求餘二邊幷用垂弧省算法平三角形邊角比例銳鈍知不知一條凡平三角形知三角者不能求三邊知三邊者可以求三角知一邊二角一角二邊者皆可以求餘角餘邊知三邊求三角法置大邊爲底以中小邊併數椉中小邊較數大邊除之得分底邊較數分底邊較數與大邊相加折半爲分底大邊相減折半爲分底小邊又以小邊爲一率分底小邊爲二率半徑爲三率求得四率爲對中邊之角餘𢎺其角必銳中邊爲一率分底大
