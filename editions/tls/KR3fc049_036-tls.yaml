body:
  text: 交卯辰弧亦成十字戊已爲甲庚之角卯辰爲乙壬之角也故卯辰之交戊己常在酉而甲庚弧卽爲酉庚角故庚酉常九十度戊丑同庚酉而庚丑爲交數故戊庚同丑酉乙丙二角放此若取甲外角乙丙兩內角卽應丑心酉次形乙外角甲丙兩內角卽應丑心土次形丙外角甲乙兩內角卽應丑申土次形四形任取理解竝通正弧布角度以明次形之理設甲乙丙三角形甲角九十度乙角三十一度丙角六十一度能布斜弧則正弧極易如圖首置一平圜任先依乙角度用二圜作丁乙戊己乙庚兩徑弧成乙角次
