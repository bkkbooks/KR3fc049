body:
  text: 一原所知角鈍對邊小又所知角銳所求對邊恒小一原所知角鈍對邊足九十度與對邊小同一原所知角鈍對邊大又所知角鈍審又所知角大於原所知角則所求對邊大若小於原所知角則不能定一原所知角鈍對邊大又所知角銳審又所知角小於原所知角之外角則所求對邊小若大於原所知角之外角則不能定一原所知無論角銳對邊小角鈍對邊大但又所知角正九十度者所求對邊皆不能定一原所知角正九十度對邊無論大小足又所知角銳所求對邊恒小又所知角鈍所求對邊恒大對邊求對角一原所知邊小對角鈍又所知邊小所求對角恒銳一原所知邊小對角鈍又所知邊大所求對角
