body:
  text: 數三分之二自乘又以三分之一乘之與眞數比眞數少或相等者有眞數多者無一九乘方正幾六乘方負幾眞數正取六乘方數十分之七立方開之又以十分之七再乘之又以十分之三乘之與眞數比眞數少或相等者有眞數多者多一十乘方正幾七乘方負幾眞數正取七乘方數十一分之八立方開之自乘又以十一分之八再乘之又以十一分之三乘之與眞數比眞數少或相等者有眞數多者無一十一乘方正幾八乘方負幾眞數正取八乘方數四分之三自乘再乘又以四分之一乘之與眞數比眞數少或相等者有眞數多者無右除眞數外皆間二位二層若十一乘方以上間二位二層者按九條之理索之卽得一立方正幾平方負幾根負幾眞數正以幾平方數爲長濶較幾根數爲帶縱平方積開得長濶二根取長根及長濶和相乘以九分之五又
