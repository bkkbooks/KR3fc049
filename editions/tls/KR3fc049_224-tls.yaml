body:
  text: 間多導者統按二十二條之理索之卽得定進退凡初商除實不盡或翻爲他實或益爲多實至求次商遞變內通行爲同名者退不者進入諸商列原題方根爲法眞數爲實令法在上實在下如設題式初商乘上層同名相加異名相減以入於次層復乘旣入之次層遞入於下層下層減盡則無次商不盡復列原題上層初商旣入實爲下層中間以初商數如初商法入於初商旣入之次層近下者一入轉而上遞加一入畢入厠列之爲變題如初商法入次商視三商之有無及入之如次商之於初商也諸商統於此求次數旣得一數無奇零合諸商數於原題內如初商法入之變題恒省下一層降其位通行同名卽無次數異名不相糅卽仍有一數異名相糅審有無如前有則重求之若初得數奇零不盡各
