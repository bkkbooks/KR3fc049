body:
  text: 邊爲二率半徑爲三率求得四率爲對小邊之角餘𢎺其角亦銳併對中邊對小邊二銳角去減半周餘爲對大邊之角知二角夾知一邊求餘角餘邊法併所知二角去減半周餘爲對所知邊之角再用對角求對邊法卽得餘二邊知二邊夾知一角求餘邊餘角法以所知二邊相併爲一率相減餘爲二率所知一角與半周相減餘半之爲半外角取其切綫爲三率求得四率爲半較角切綫其角必銳半較角與半外角相加爲對所知大邊之角相減餘爲對所知小邊之角再用對角求對邊法卽得對所知角之邊知一角對知一邊知又一角對不知邊求餘角餘邊法併二角去減半周餘爲原不知之一角再用對角求對邊法卽得餘二邊知一邊對知一角鈍知又一邊對不知角求餘角餘邊法用對邊求對角法求得對所知又一邊之角必銳併二角去減半周卽得原不知之又一角再用對角求對邊法卽得原不知之一邊以上五
