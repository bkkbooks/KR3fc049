body:
  text: 歙汪萊著弧三角形弧角比例銳鈍大小知不知條目對角求對邊一原所知角銳對邊大又所知角銳所求對邊恒小一原所知角銳對邊大又所知角鈍所求對邊恒大一原所知角銳對邊足九十度與對邊大同一原所知角銳對邊小又所知角銳審又所知角小於原所知角則所求對邊小若大於原所知角則不能定一原所知角銳對邊小又所知角鈍審又所知角之外角小於原所知角則所求對邊大若大於原所知角則不能定一原所知角鈍對邊小又所知角鈍所求對邊恒大
