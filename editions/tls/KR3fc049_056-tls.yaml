body:
  text: 此形之倍句椉彼形之倍句兩形之倍句皆爲句𢎺和中減去句𢎺較之數卽一爲三率中減去首率之數一爲三率中減去末率之數兩數相椉卽有一中率自椉之方一首率椉中率長方一首率椉末率長方同於中率自椉之方一末率椉中率長方皆以中率齊之則以中率爲闊以三率併數爲帶縱矣又準前論旣以中率爲高則恰成中率自椉爲底三率併數爲帶縱之長立方故四倍句股積自椉句𢎺和除之爲帶縱長立方積以句𢎺和爲所帶之縱求得中率也以此中率與句𢎺和三率併數相減自餘首末二率併數中率自椉之數卽同首末二率相椉之數以此數爲帶縱平方積自合以首末二率併數爲長闊和故以中率自椉爲帶縱平方積
