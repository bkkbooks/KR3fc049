body:
  text: 歙汪萊著平圓形有圓內若干度之通弴求其度五分之一之通弴法曰取所有若干度之通弴五分之一爲第一數於第一數首位加一數爲第二數第二數自椉再椉得數以半徑自椉之數除之得數爲第三數第三數自椉得數以第二數除之得數取其五分之一爲第四數以第二數加入第四數減去第三數爲第五數視第五數與第一數恰合則第二數卽爲五分之一之通弴密數矣若第五數少於第一數則如前法更加之求之視之若第五數多於第一數則首位所加之數不可加而還其本數待次位之加次位三位以下若有多位皆如前法定之解曰平圓形內任截所有度成五全分一通弴按其度五平分截之成五分之一五通弴又依
