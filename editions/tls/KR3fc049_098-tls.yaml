body:
  text: 截於外者爲三率五分之三通弴中一截少於五分之一通弴之數爲四率也於是知五分之三通弴較五分之一通弴爲三倍而少一半徑爲一率五分之一通弴爲二率之四率然則有五全分度之通弴何以求之乎曰五全分度之通弴爲四半徑所割成五截五分之三二通弴爲四半徑所割成六截去其中交錯之二截其餘兩㫄之四截總數與五全分通弴兩㫄之四截總數等葢五分之三二通弴六截內一㫄兩截總數及五全分通弴五截內一旁兩截總數與割五全分中一分之半徑中截成次設三角形而五分之三通弴與五全分通弴所夾之角必與五分之一之度等緣五全分之通弴與半徑所夾之角爲五全分之半外角五分之三通弴與半徑所夾之角爲五分之三半外角五全分外角較五分之三外角少五分之二五分之三半外角較五全分半外角多五分之一五分之三通弴與五全分通弴所夾之角適當此所
