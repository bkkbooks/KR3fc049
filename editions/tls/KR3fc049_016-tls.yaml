body:
  text: 下弧則後餘角卽爲對先用所知邊不知之角後交角與前餘角相加爲對所知又一邊不知之角若所知又一邊小於前下弧則後餘角之外角爲對先用所知邊不知之角後交角與前餘角相減餘爲對所知又一邊不知之角一所知兩邊對所知兩角法先任以所知一角爲交角對所知又一角所知之邊爲上弧用正弧三角法求得下弧對弧餘角三件又審所知又一角之銳鈍與先用所知角相同卽以所知又一角爲交角若所知又一角之銳鈍與先用所知角不同則以所知又一角之外角爲交角前對弧復爲對弧所知對先用所知角之邊爲上弧用正弧三角法求得下弧餘角二件審所知二角銳鈍相同以前後兩下弧相加爲不知之邊前後兩餘角相加爲不知之角若所知二角銳鈍不同以前後兩下弧相減餘爲不知之邊前後兩餘角相減餘爲不知之角省算
