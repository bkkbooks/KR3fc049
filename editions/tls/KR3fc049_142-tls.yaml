body:
  text: 乘方積相等可知同第一一有幾根積少幾一乘方積與幾二乘方積相等左右降位命爲幾眞數少幾根積與幾一乘方積相等可知同第二一有幾根積多幾二乘方積與幾眞數相等可知同第四一有幾根積少幾二乘方積與幾眞數相等不可知同第九一有幾根積多幾二乘方積與幾一乘方積相等左右降位命爲幾眞數多幾一乘方積與幾根積相等不可知同第五一有幾根積少幾二乘方積與幾一乘方積相等左右降位命爲幾眞數少幾一乘方積與幾根積相等可知同第二一有幾一乘方積多幾眞數與幾根積相等不可知同第五一有幾一乘方積少幾眞數與幾根積相等可知同第一
