body:
  text: 根爲首末二率皆有微差故益實之時必須加減其長恒失之多闊恒失之少者緣中率旣截奇零已失之少自椉爲帶縱平方積則積亦少及與句𢎺和相減餘爲長闊和又失之多積失之少而長闊和失之多則長闊較必失之多而長恒失多闊恒失少矣益實之時失多用減失少用加加減不過中率皆易明也其以除得數恰合加過減過之根爲密而多則更加減少則還本數者由相補之積有定限試以長根命爲首率闊根命爲末率帶縱立方積命爲中末二率併數自椉爲底首率爲高之積觀之設三率併數自椉之方爲範以中末二率併數自椉爲底首率爲高之積置於中末二率併數之方又以末率自椉再椉爲隅末率自椉椉倍首中二率併數爲兩廉之曲矩形積置於所設範對中末二率併數方角之兩㫄其間必空首末二率之
