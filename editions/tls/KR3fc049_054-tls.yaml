body:
  text: 又以兩形之股相椉爲高葢此積本以倍句與股相椉爲一椉又以倍句與股相椉之數椉之爲再椉此再椉中卽可分作倍句爲再椉股爲三椉而凡三次之椉或此先而彼後或彼先而此後無不可故卽可視作倍句自椉爲一椉股爲再椉復爲三椉而此兩形之句股原可互用故卽可視作兩形之倍句相椉爲底兩形之股相椉爲高又凡句𢎺和開方得根之數與句𢎺較開方得根之數相椉卽得股數今此四倍句股積自椉之立體旣視作兩形之股相椉爲高若以句𢎺和除之卽如以句𢎺和之根除過二次而此形卽變爲兩句𢎺較各開方之根數相椉爲高矣準前論句𢎺和爲三率併數兩形句𢎺較爲首末二率今此形以兩句𢎺較之根相椉爲高卽是以首末二率之根相椉爲高夫首末二率之根相椉卽中率也又準前論句𢎺和爲三率併數兩句𢎺較爲首末二率今此形之底原以
