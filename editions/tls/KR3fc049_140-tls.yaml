body:
  text: 之各爲每根之數以計原眞數皆合其實每根之數不可知一有幾眞數少幾二乘方積與幾一乘方積相等可知同第八一有幾根積多幾眞數與幾一乘方積相等可知同第一一有幾根積少幾眞數與幾一乘方積相等不可知同第五一有幾根積多幾眞數與幾二乘方積相等可知同第三一有幾根積少幾眞數與幾二乘方積相等不可知同第九一有幾根積多幾一乘方積與幾眞數相等可知同第二一有幾根積少幾一乘方積與幾眞數相等不可知同第五一有幾根積多幾一乘方積與幾二乘方積相等左右降位命爲幾眞數多幾根積與幾一
