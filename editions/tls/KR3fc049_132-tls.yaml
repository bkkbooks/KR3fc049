body:
  text: 以不知爲知不可也而猶可也以不可知爲知大不可也何可乎以不知爲知何不可乎以不可知爲知物予我以知我暫不知會心焉有待也物不任我以知我謬附以知見魔焉迷不反也嗟乎使物有知不且笑知已乎故曰知其不可知知也辛酉仲秋吾友江鄭堂畢子廉相將爲䢴水之遊湖上盃間發我知者何限未幾巾車遊南嶽臨別之頃與鄭堂察秦九韶開方術及李冶天元一術多以不可知爲知者遂就二乘方以下𥳑且易者畧爲條目以正之首錄一冊寄吾友焦理堂理堂其樂道予之知歟末不亦樂乎予之不知也歙汪萊
  hash: sha256:d4dd4eda9e206d39f18a948f88dc17e54512406458052032a29269927133c1f0
