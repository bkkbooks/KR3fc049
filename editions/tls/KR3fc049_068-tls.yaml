body:
  text: 長微多微少之數雖恰相同而一長一短之積不足相補則較立方冪之中率自椉同於末率不差椉首率不差之數者又少矣夫以所截立方積之多補入空曲矩之少其積必浮而出以三率併數自椉之方除之所得之數能不多於所設之數乎故以除得之數多於所設之數定知設數之尙少所當更加者也又或原所設之末率微差而多則以所截立方形首末二率相較數之高對空曲矩形首末二率相較數之闊亦無不合而空曲矩形中四段積之立冪爲末率微多之數椉中率之長二較立方之冪末率不差之數椉二中率者多矣爲末率微多數椉末率長一較立方冪末率不差之數自椉者多矣爲末率微多之數椉首率微少之長一而首率之微少僅以末率不差之數爲長末率之微多直以首率微少之數過於中率者爲長微多微少之數雖恰相同一長一短之積不足相消則較立方冪之中率自椉同於首率不差椉末
