body:
  text: 設甲乙丙斜弧三角形如圖甲乙二角有甲乙邊爲二角之角㫄弧倚於平儀之外周量取甚易取丙角則視丙乙弧應外周爲乙戊弧從戊作識數之過乙到已得九十度以乙已弧應於內下曲弧爲乙丁識之又視甲丙弧應外周爲甲庚弧從庚作識數之向甲到辛得九十度以庚辛弧應於內上曲弧爲丙壬識之乃以兩內上曲弧交角丙對圜心丑作虛直距遂作虛十字横距割外周於子癸從子割丁到癸作內下曲弧從子割壬到癸作內上曲弧合子丁子壬應外周之度如自角至亢之度卽丙角度附錄有角㫄弧在外周量法
