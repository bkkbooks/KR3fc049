body:
  text: 二股三十五𢎺三十七句𢎺和亦四十九句股積亦二百一十扁立方有時所通亦扁立方高九闊十高闊和十九立方積九百高四闊十五高闊和亦十九立方積亦九百若問者暗執一形則對者交盲兩數循齋諸君見未及此謂以理推之和數與較數有對待者遂意此和此積之僅有一形苦思力索法成而不可用惜哉梅君循齋法見增刪算法統宗丁君維烈法見赤水遺珍
