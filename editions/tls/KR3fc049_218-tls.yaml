body:
  text: 一三乘方正幾根負幾眞數正取根數四分之一立方開之又以四分之三乘之與眞數比眞數少或相等者有眞數多者無一四乘方正幾平方負幾眞數正取平方數五分之二立方開之自乘又以五分之三乘之與眞數比眞數少或相等者有眞數多者無一五乘方正幾立方負幾眞數正取立方數二分之一自乘與眞數比眞數少或相等者有眞數多者無一六乘方正幾三乘方負幾眞數正取三乘方數七分之四立方開之又以七分之四乘之又以七分之三乘之與眞數比眞數少或相等者有眞數多者無一七乘方正幾四乘方負幾眞數正取四乘方數八分之五立方開之自乘又以八分之五乘之又以八分之三乘之與眞數比眞數少或相等者有眞數多者無一八乘方正幾五乘方負幾眞數正取五乘方
