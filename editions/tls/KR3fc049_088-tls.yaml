body:
  text: 戊午秋季歸自白門抱璞而泣孟嘉適翻算表顧謂予曰且談藝可乎予曰唯唯孟嘉曰八線之制其法終於三分取一表之眞數僅得十分之二誠能立五分取一之法則全表皆確數矣子盍思之予諾之而未暇也轉𣊬又屆秋初孟嘉殤厥中男移居別館不淚而傷予無文不能制東野失子之篇思以瑣故移其情遂構此術稍演得三千言強使遊目以破一須臾之感歙汪萊
