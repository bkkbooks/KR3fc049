body:
  text: 含比例連三率兩𢎺較當首末二率而連三率之理末率不及三率併數三分之一者首率必過三率併數三分之一股𢎺較之法則必在股𢎺和十二分有奇之二有奇以下斷不及股𢎺和三分之一故首末二率其一爲股𢎺較者其一必爲句𢎺較三率併數此形爲股𢎺和者等積之彼形必爲句𢎺和不至有兩積相等兩股𢎺和相等之相淆而凡句𢎺和與句股積遇有求得闊根變爲股𢎺較者亦不至有兩積相等兩句𢎺和相等之互易矣又前法旣以長闊二根得首末二率則股𢎺較不及三率併數三分之一者必當闊根故以闊根得股𢎺較也有帶縱長立方高闊和帶縱長立方積求高闊兩數法曰如前兩帶縱扁立方等積等高闊和法求得長根爲高以高減高闊和爲闊解曰等積等高闊和之兩帶縱立方形兩高數恒爲首末二率高闊和恒爲三率併數與等積
