body:
  text: 中率與句𢎺和相減餘爲長闊和用帶縱平方長闊和法求得長闊二根爲首末二率亦卽爲兩形之兩句𢎺較也中率有奇零求兩句𢎺較密數法曰凡中率以帶縱立方開之得數遇有奇零不盡者不得不截其餘以求得帶縱平方長闊二根爲首末二率必有微差長根恒失之多闊根恒失之少用益實歸除法則可得其密數以前所得長根之數先就首位減去一數用其餘數爲減過長根之數自椉得積又用句𢎺和倍之減去減過長根之數用其餘數以椉前自椉之積得數加入前帶縱立方積爲實句𢎺和自椉之數爲法除之視其得數較減過長根之數恰合則卽爲密數矣若多則更當減少則不可減更當減則又減一數如前法求之如前法視之不可減則還其本數待次位之減次位三位以下若有多位皆如前法定之求闊根以前所得之數先就首位加一數爲加過闊根之數自
