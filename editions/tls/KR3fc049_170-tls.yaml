body:
  text: 之數共爲通分法之三母三數之計原眞數皆合也然或爲長闊和之數過少折半自乘尙不及其爲帶縱平方積之數則卽無三數相淆其眞一根之數卽爲可知者巳其以所命幾一乘方數折半爲假一根之數以其數自乘與所命幾根數相較而少於幾根數卽取減餘根數又以假一根之數乘之與所命幾眞數相較而見多於幾眞數者則又以所命幾一乘方數三分之一爲假一根之數如前法較而視之如其恰合則眞一根卽三分之一矣如其或多或少則復以前折半法見多相較餘眞數命爲幾眞數前折半法相較餘根數命爲幾根數前折半法假一根之數命爲幾一乘方數共命爲一二乘方積少幾一乘方積多幾根積與幾眞數相等仍用前折半法更折半較而視之總以見少而止卽用前法求得眞一根之數與原假一根之數相減餘卽得原眞一根之數其求有無三數
