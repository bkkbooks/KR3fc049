body:
  text: 多之數也此角旣同五分之一其餘一爲割五全分中一分之半徑交五全分通弴之角此角按三角形并二餘角爲外角之理卽爲五全分半外角及五分之二總數恰合五分之一半外角一爲割五全分中一分之半徑交五分之三通弴之角亦必爲五分之一半外角是與前三三角形又爲同式而兩要之夾五分之一之角者亦必相等故五分之三二通弴六截內一旁之兩截總數與五全分通弴五截內一旁之兩截總數等也準前論五分之三通弴中一截較五分之一通弴少一四率旁一截恰合五分之一通弴合二截爲二率五分之一通弴之二倍而少一四率於是知五全分之通弴兩旁四截之總數爲二率之四倍而少二四率更觀五全分通弴中一截亦與其所當五分之一通弴爲平行而更近圓心其數更少然試於五全分中一分通弴之一端與又一端之半徑作平行綫以截五全分之通弴所截之數亦必與五分之
