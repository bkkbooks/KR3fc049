body:
  text: 度也此度旣等五分之一而其餘兩角半徑與五分之一通弴所夾之一角小形旣與大形共之則小形之又一角亦不得不等於大形凡大小兩三角形二角等者三角必等且三邊之比例必等所謂同式形也今大形夾五分之一之角爲相等之兩半徑則小形夾五分之一之角有不爲相等之兩邊乎此五分之三通弴爲半徑所截者兩㫄兩截必與五分之一通弴相等也至其中一截與所當五分之一通弴平行同爲兩半徑所夾而較五分之一通弴爲近於圓心自小於五分之一通弴試由五分之三中一分通弴之一端與又一端之半徑作平行綫以截五分之三之通弴則兩線之間所截者必與五分之一通弴等葢五分之三通弴旣與五分之三中一分之通弴平行今一端所作之綫又與又一端之半徑平行凡四邊形四綫兩兩平行者必兩兩相等勢也又試以半徑爲一率五分之一通弴爲二率則半徑爲五分之三通弴
