body:
  text: 視作倍句自椉爲底股自椉爲高然句𢎺和與句𢎺較相椉卽如股自椉之數則就句𢎺和旣除之後觀之卽可視作倍句自椉爲底句𢎺較爲高夫此倍句視作首中二率則句𢎺較必爲末率此倍句視作中末二率則句𢎺較必爲首率若以末率自椉再椉爲隅倍首中二率椉末率自椉之數爲兩廉加入倍句自椉爲底句𢎺較爲高之積卽成三率併數自椉爲底末率爲高之積三率併數之句𢎺和自椉得數除之必得末率之句𢎺較矣或以首率自椉再椉爲隅倍中末二率椉首率自椉之數爲兩廉加八倍句自椉爲底句𢎺較爲高之積卽成三率併數自椉爲底首率爲高之積三率併數之句𢎺和自椉得數除之必得首率之句𢎺較矣而今所得長闊二
