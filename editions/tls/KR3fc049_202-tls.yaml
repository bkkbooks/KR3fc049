body:
  text: 昔在揚州爲秦太史客太守張古愚先生枉顧趨答之居兩月論經談藝遊必偕焉飮食敎誨誼至篤也予匆匆去六安太守亦囘治川沙予以第五册算書郤寄就正太守疑之謂其過苦越三年聞太守作開方補記樂得其甘時太守與予均復在揚然不以示予太守之客則吾友沈君狎鷗李君尚之聚散離鴿於斯感焉予授徒多暇亦謀其甘續爲此册太守移任江西無可就正付庋閣又越五六年庚午春來官石埭諸生有嗜算者出以示之縣尉濟寧劉君景堂國子張君未山茂才唐子步靑蘇子珮偕愛之遂付之梓太守倘見之還吿其過則幸已歙汪萊
