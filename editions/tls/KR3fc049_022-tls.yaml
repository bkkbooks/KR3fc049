body:
  text: 原角銳分邊大此邊大又以分邊之正𢎺爲一率前下弧之正𢎺爲二率原所知角之切綫爲三率求得四率爲對先用邊不知之角切綫銳鈍定例原角鈍又一邊大於前下弧此角鈍原角鈍又一邊小於前下弧此角銳原角銳又一邊小於前下弧此角鈍原角銳又一邊大於前下弧此角銳乃以所得對先用邊之角爲交角所知又一邊爲上弧用正弧三角法求得下弧置之又以對原所知角之邊正𢎺爲一率原所知角之正𢎺爲二率所知又一邊之正𢎺爲三率求得四率爲對所知又一邊不知之角正𢎺銳鈍定例對先用邊角鈍對原角之邊大於後下弧此角鈍對先用邊角鈍對原角之邊小於後下弧此
