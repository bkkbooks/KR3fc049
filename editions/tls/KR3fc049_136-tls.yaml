body:
  text: 一有幾眞數少幾根積與幾二乘方積相等以幾根數爲帶縱扁立方高濶較以幾眞數自乘又以幾二乘方數乘之爲帶縱扁立方積帶縱扁立方法開之得高根以幾二乘方數除之得數以一乘方法開之每根之數可知一有幾眞數多幾一乘方積與幾根積相等以幾根數爲帶縱平方長闊和以幾一乘方數乘幾眞數爲帶縱平方積帶縱平方長濶和法開之得長濶兩根各以幾一乘方數除之得數各爲每根之數以計原眞數皆合其實每根之數不可知一有幾眞數少幾一乘方積與幾根積相等可知同第二一有幾眞數多幾一乘方積與幾二乘方積相等以幾一乘方數爲帶縱扁立方高濶較以幾二乘方數自乘乘幾眞數爲帶縱扁立方積帶縱扁立方法開之得濶根以幾二乘方數除之每根之數可知
