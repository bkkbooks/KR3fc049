body:
  text: 三例以明孝嬰之書之所以然于是秦李兩家之學至此益明今年村居敎徒稀入城市出入于農圃醫卜之術秋八月有走馬來者叩門甚迫童子驚相告予視之則孝嬰也延入塾中對飮于豆花蛬語間孝嬰謂予日或謂尚之誚吾所著書有之乎予因出尚之所爲簷齋算學跋與之孝嬰怡然曰尚之固不我非也因謂予曰子亦爲我一言予諾之孝嬰復走馬去門人請日秦李之書李君疏之汪君難之不已異乎予日此兩君所以是也兩漢經生守一家之言華薻鞶帨通人鄙其固焉鄭康成爲禮經作注雖子夏之言勻駮之秦越人宗岐伯之言而作八十一難葢非深入其室者不能疏亦非深入其室者不能難得李君之疏而秦李之書明得汪君之難而秦李之書益明古人立言固樂夫人之深入而難我不樂人之略觀大意而諂附我也門人退錄之以寄孝嬰卽以爲之言嘉慶癸亥中秋前一日江都焦循記
  hash: sha256:780123f887e949d9ba5a979dbbe6b1a40a713e07b608fc83b5bba53717e454aa
