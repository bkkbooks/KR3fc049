body:
  text: 較開諸乘方數根數眞數糅雜訣審有無一平方正幾根負幾眞數正取根數二分之一自乘與眞數比眞數少或相等者有眞數多者無一立方正幾平方負幾眞數正取平方數三分之二自乘又以三分之一乘之與眞數比眞數少或相等者有眞數多者無一三乘方正幾立方負幾眞數正取立方數四分之三自乘再乘又以四分之一乘之與眞數比眞數少或相等者有眞數多者無右除眞數外皆相連二層或三乘方以上亦相連二層者按三條之理索之卽得一立方正幾根負幾眞數正取根數三分之一平方開之又以三分之二乘之與眞數比眞數少或相等者有眞數多者無一三乘方正幾平方負幾眞數正取平方數二
