body:
  text: 角則三外角之應爲丑心土次形其餘三次形爲兩內角一外角相應之三形設丁乙丙三角則三外角之應爲丑心酉次形其餘三次形爲兩內角一外角相應之三形故斜弧無論何形皆可用三外角亦可任用兩內角一外角正弧以一角加減象限爲次形對弧定例兩銳恒置一象限減之兩鈍恒置三象限減之一銳一鈍用銳加一象限用鈍減去一象限正弧算法理爲求得次形上弧之正𢎺命爲本形下弧之餘𢎺法以交角之正𢎺爲一率餘角之餘𢎺爲二率半徑爲三率求得四率爲下弧之餘𢎺大小依相從條目定之得下弧再求上弧對弧竝依正弧三角法斜弧算法理爲求得次形三角以爲本形三邊凡本形之角爲次形邊卽以其邊所對之角爲本形角所
