body:
  text: 之蓋得明君圖所解者大守祕其書不相示豫至都中求之司博士廷棟博士購之經歲不能得聞之人云明君所傳者陳君季新季新早卒無傳然張太守已得之惜豫不茆見爾因朱君出其全法思悟及此急攺刋舊論並記之以志吾過第五冊算書蹊跋是卷窮幽極微真算氏之最也愚更以正負開方為說括為三例其一凡隅實異名正在上負在下或負在上正在下中間正負不相間者可知其二凡隅實異名中間正負相間開方時其與隅異名之從亷皆翻而與隅民名者可知不者不可知其三凡隅實同名者不可知質諸孝嬰未審以為何如計余與孝嬰别已二載今孝嬰假館六安余又旅寓杭州相去千餘里安得同共一堂相與極論也念之念之壬戌八月初九日元和李鋭跋記曰右一篇吾友李尚之為余第五冊算書作
