body:
  text: 鋭若小於原所知邊則不能定一原所知無論邊大對角鈍邊小對角鋭但又所知邊足九十度者所求對角皆不能定一原所知邊足九十度對角無論鋭鈍正又所知邊大所求對角恆鈍又所知邊小所求對角恆鋭附録弧角比例算法凡附録皆古法對角求對邊一率原所知角正弦二率所知對邊正弦三率又所知角正弦四率所求對邊正弦對邊求對角一率原所知邊正弦二率所知對角正弦三率又所知邊正弦四率所求對角正弦正弧三角鋭鈍大小相從條目
