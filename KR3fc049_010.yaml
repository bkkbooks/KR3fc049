body:
  text: 銳若小於原所知邊則不能定一原所知無論邊大對角鈍邊小對角銳但又所知邊足九十度者所求對角皆不能定一原所知邊足九十度對角無論銳鈍正又所知邊大所求對角恒鈍又所知邊小所求對角恒銳附錄弧角比例算法凡附錄皆古法對角求對邊一率原所知角正𢎺二率所知對邊正𢎺三率又所知角正𢎺四率所求對邊正𢎺對邊求對角一率原所知邊正𢎺二率所知對角正𢎺三率又所知邊正𢎺四率所求對角正𢎺正弧三角銳鈍大小相從條目
