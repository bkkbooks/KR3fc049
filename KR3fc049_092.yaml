body:
  text: 兩旁互截其五分之三成五分之三交錯二通弴按五平分度作四半徑割之此五分之三之通弴其兩旁之兩截皆與五分之一通弴等蓋兩半徑與五分之一通弴所成大三角形內為五分之三通弴所截成一小三角形而五分之一通弴與五分之三通弴其中所夾之角必與大形五分之一之度等緣五分之三之通弴與半徑所夾之角得五分之三外角之半五分之一之通弴與半徑所夾之角得五分之一外角之半五分之三外角較五分之一外角少五分之二五分之一半外角較五分之三半外角多五分之一五分之一通弴與五分之三通弴所夾之角適當此所多之
