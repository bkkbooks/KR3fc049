body:
  text: 如前圖甲乙丙三角形量取甲角法先從甲㸃向圜心丑作虛直距遂作虛十字橫距割上曲弧於申引之割外周於未乃從申作虛十字綫割外周於酉數外周自未至酉之度卽甲角度量取乙角與量取甲角法同三角求邊用次形通法斜弧布角度以明次形之理設甲乙丙三角形甲角一百四度半乙角一百二十八度丙角一百九度如圖首置一平圜任先依甲角度作甲角用二圜一作甲丁上下曲弧一作戊已横距角度
