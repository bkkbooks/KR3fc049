body:
  text: 也余書以辛酉之冬寄里堂里堂閒二載北燕南越不得以書札報余今年夏余始復至揚城里堂隱居北湖炎暑歊蒸四閲月未獲一面八月七日暑氣稍平乃策馬徑至里堂之門秋禾登場百步外馬不容足侯彊侯以肅客將命須臾導我入門而右里堂自闈門出迎造于館書屋三間屋前爲圃圃外爲湖波光雲影鳥語花香令人作世外想余所攜僮僕圉人息于左廡余與里堂止于榭皆坐敘别敘思戒炊命酤里堂乃出尚之此篇計去作日期一載矣讀之同聲相應吾友之與人爲善一至于此爲之大快里堂則又曰尚之作此篇時客于西子湖頭蘇小墓之側悼亡未朞加以失子酸楚不可言追訊往事又不得不爲尚之悲已袖而歸學舍以授學者延麟延麟謂前冊頁已過多續刻諸此冊之末因記其略如此論曰尚之此例足爲余書之凡而余書所謂不可知之數有二數相淆者有三數相淆者推之
