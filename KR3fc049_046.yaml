body:
  text: 題皆無鋭鈍遊移之慮惟知一邊對知一角鋭知又一邊對不知角者若求其角則有知不知之別凡原所知邊大於又所知邊對角鋭則又所知邊所求對角亦鋭若原所知邊小於又所知邊對角鋭則又所知邊所求對角不能定附録邊角比例算法對角求對邊一率原所知角正𢎺二率原所知對邊三率又所知角正𢎺四率所求對邊對邊求對角一率原所知邊二率原所知對角正𢎺三率又所知邊四率所求對角正𢎺
