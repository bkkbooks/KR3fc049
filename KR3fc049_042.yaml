body:
  text: 對之邊凡本形之外角為次形邊即以其邊所對角之外角為本形角所對之邊法以半徑自乘為一率所求邊旁兩角餘割線相乘為二率併邊旁兩角較半周餘弧之矢與對角矢相減餘為三率求得四率為所求邊之矢或以邊旁兩角相減餘弧之矢與對角外角之矢相減餘為三率求得四率為所求邊較半周餘弧之矢得一邊再求餘二邊並用垂弧省算法平三角形邊角比例鋭鈍知不知一條凡平三角形知三角者不能求三邊知三邊者可以求三角知一邊二角一角二邊者皆可以求餘角餘邊知三邊求三角法置大邊為底以中小邊併數乘中小邊較數大邊除之得分底邊較數分底邊較數與大邊相加折半為分底大邊相減折半為分底小邊又以小邊為一率分底小邊為二率半徑為三率求得四率為對中邊之角餘弦其角必鋭中邊為一率分底大
