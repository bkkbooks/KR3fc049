body:
  text: 千萬億相挨諸數分別加之至如其乘數而止為纍乘法乃置根數以纍乘法纍乘之得數為實又置一為法首用二三四五六七八九十以至百千萬億相挨諸數纍乘之為諸乘三角堆之除法以所求乘數相當之除法除前實得積數設如設根數五求四乘三角堆以五加一為六加二為七加三為八加四為九所求系四乘加四止矣共計六七八九得四纍乘法乃置根數五纍乘之初次用六乘得三十二次用七乘得二百一十三次用八乘得一千六百八十四次用九乘得一萬五千一百二十為實又置一初次用二乘得二二次用三乘得六三次用四乘得二十四四次用五乘得一百二十所求系四乘與此第四次所得之除法相當矣即以此除法一百二十除前實得一百二十六為積數
