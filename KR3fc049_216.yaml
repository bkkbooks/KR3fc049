body:
  text: 分之一自乘與真數比真數少或相等者有真數多者無一四乘方正幾立方負幾真數正取立方數五分之三平方開之又以五分之三乘之又以五分之二乘之與真數比真數少或相等者有真數多者無一五乘方正幾三乘方負幾真數正取三乘方數三分之二自乘又以三分之一乘之與真數比真數少或相等者有真數多者無一六乘方正幾四乘方負幾真數正取四乘方數七分之五平方開之又以七分之五再乘之又以七分之二乘之與真數比真數少或相等者有真數多者無一七乘方正幾五乘方負幾真數正取五乘方數四分之三自乘再乘又以四分之一乘之與真數比真數少或相等者有真數多者無右妊真數外皆間一們二層若七乘方以上亦間一位二層者按六條之理索之即得
