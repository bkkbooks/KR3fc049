body:
  text: 與幾根積相等以幾根數爲中率之帶縱長立方高濶較以幾眞數乘幾一乘方數爲方法以幾眞數自乘乘幾二乘方數爲帶縱長立方積帶縱長立方有帶方法開之得濶根爲中率中率與幾根數相減餘爲帶縱平方長濶和中率自乘得數加入方法爲帶縱平方積帶縱平方長濶和法開之得長濶兩根各以幾二乘方數除之得數又各爲帶縱平方積以幾二乘方數除幾一乘方數又爲帶縱平方長濶較帶縱平方法開之各得濶根各爲每根之數以計原眞數皆合其實每根之數不可知一有幾眞數多幾一乘方積又少幾二乘方積與幾根積相等可知不可知幷同第五十一一有幾眞數少幾一乘方積又多幾二乘方積與幾根積相等不可知同第五十五一有幾眞數少幾一乘方積又少幾二乘方積與幾根積相等可知同第五十二
