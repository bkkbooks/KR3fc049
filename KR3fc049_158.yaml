body:
  text: 與幾根積相等以幾根數為中率之帶縱長立方高濶較以幾真數乘幾一乘方數為方法以幾真數自乘乘幾二乘方數為帶縱長立方積帶縱長立方有帶方法開之得濶根為中率中率與幾根數相減餘為帶縱平方長濶和中率自乘得數加入方法為帶縱平方積帶縱平方長濶和法開之得長濶兩根各以幾二乘方數除之得數又各為帶縱平方積以幾二乘方數除幾一乘方數又為帶縱平方長濶較帶縱平方法開之各得濶根各為每根之數以計原真數皆合其實每根之數不可知一有幾真數多幾一乘方積又少幾二乘方積與幾根積相等可知不可知並同第五十一一有幾真數少幾一乘方積又多幾二乘方積與幾根積相等不可知同第五十五一有幾真數少幾一乘方積又少幾二乘方積與幾根積相等可知同第五十二
