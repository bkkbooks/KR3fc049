body:
  text: 原幾二乘方數乘之命為真數别以其數除原幾根數得數命為幾一乘方數原幾一乘方數命為幾根數原幾二乘方數不問多少總命為一二乘方數共命為幾真數多一二乘方積又多幾一乘方積與幾根積相等乃以後幾真數自乘為帶縱長立方積以原幾一乘方數為帶縱長立方高闊較以後幾一乘方數乘後幾真數為方法帶縱長立方有帶方法開之得濶根為原實有一乘方兩數之中率以原幾一乘方數減去中率以其餘數為帶縱平方長闊和又以方法加入中率自乘數為帶縱平方積帶縱平方長闊和法開之得長濶二根各為兩實有一乘方數各帶一乘方法開之之幾數各以其數與原幾一乘方數相減餘又各以原幾二乘方數除之各為原每根之數以計原真數皆合其實每根之數不可知一有幾真數多幾根積又少幾二乘方積與幾
  hash: sha256:149ac42a6a066ca91ca4a6f5166377ebbaf7cd12354a28f0bb7fed12b739b5bf
