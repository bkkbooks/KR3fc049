body:
  text: 原幾二乘方數乘之命爲眞數别以其數除原幾根數得數命爲幾一乘方數原幾一乘方數命爲幾根數原幾二乘方數不問多少總命爲一二乘方數共命爲幾眞數多一二乘方積又多幾一乘方積與幾根積相等迺以後幾眞數自乘爲帶縱長立方積以原幾一乘方數爲帶縱長立方高闊較以後幾一乘方數乘後幾眞數爲方法帶縱長立方有帶方法開之得濶根爲原實有一乘方兩數之中率以原幾一乘方數減去中率以其餘數爲帶縱平方長闊和又以方法加入中率自乘數爲帶縱平方積帶縱平方長闊和法開之得長濶二根各爲兩寔有一乘方數各帶一乘方法開之之幾數各以其數與原幾一乘方數相減餘又各以原幾二乘方數除之各爲原每根之數以計原眞數皆合其寔每根之數不可知一有幾眞數多幾根積又少幾二乘方積與幾
  hash: sha256:f34ad9afad8cd6e01137fda244f3cc9c0f9a87b09cf9a1d9ba73b45e06454bf3
