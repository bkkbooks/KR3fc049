body:
  text: 通弴如前法求得三率是爲九倍又求得四率是爲二十七倍應減二十七分之一至五全分通弴較五分之一五通弴併數少五四率准前法應減二十五分之一至七全分通弴較七分之一七通弴併數少一十四四率應減二十四分小分五之一大分九全分通弴較九分之一九通弴併數少三十四率應減二十四分小分三之一大分遞而計之五分較三分於二十四分之外省三分之二七分図五分省二分之一九分較七分省五分之二由是母子俱進母大而子小此二十四分之餘正如一尺之棰日取其半萬世不竭也夫有數不能竭者無數竭之諸分者有數等邊形弧線者無數最多邊形最多而無數此二十四分之餘不得不竭故無論何度何分徑減四率二十四分之一至六十等率之加八十二等率之減數旣相因理無二致善會者自得之此册推演舊術遜其妙已記曰舊刻此册誤詆德美之失古愚張太守非
