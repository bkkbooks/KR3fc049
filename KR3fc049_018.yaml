body:
  text: 一所知一邊在所知兩角之間法以所知邊為上弧先任以所知一角為交角用正弧三角法求得下弧餘角二件以所知又一角與此餘角相減餘為分角乃以分角之餘𢎺為一率前餘角之餘𢎺為二率原所知邊切線為三率求得四率為對先用角不知之邊切線大小定例先用角鈍分角鋭此邊大先用角鈍分角鈍此邊小先用角鋭分角鋭此邊小先用角鋭分角鈍此邊大又以前餘角之切線為一率前下弧切線為二率分角切線為三率求得四率為加減邊切線大小定例分角鋭此邊小分角鈍此邊大審所知又一角大於前餘角以此邊與前下弧相加若小於前餘角以此邊與前下弧相減皆
