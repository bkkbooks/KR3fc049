body:
  text: 邊為二率半徑為三率求得四率為對小邊之角餘弦其角亦鋭併對中邊對小邊二鋭角去減半周餘為對大邊之角知二角夾知一邊求餘角餘邊法併所知二角去減半周餘為對所知邊之角再用對角求對邊法即得餘二邊知二邊夾知一角求餘邊餘角法以所知二邊相併為一率相減餘為二率所知一角與半周相減餘半之為半外角取其切線為三率求得四率為半較角切線其角必鋭半較角與半外角相加為對所知大邊之角相減餘為對所知小邊之角再用對角求對邊法即得對所知角之邊知一角對知一邊知又一角對不知邊求餘角餘邊法併二角去減半周餘為原不知之一角再用對角求對邊法即得餘二邊知一邊對知一角鈍知又一邊對不知角求餘角餘邊法用對邊求對角法求得對所知又一邊之角必鋭併二角去減半周即得原不知之又一角再用對角求對邊法即得原不知之一邊以上五
