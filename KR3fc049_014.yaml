body:
  text: 正算一所知一邊在所知兩角之間法以所知邊爲上弧先任以所知一角爲交角用正弧三角法求得下弧對弧餘角三件以所知又一角與此餘角相減餘又爲交角前對弧爲下弧用正弧三角法求得上弧對弧餘角三件後所求得之上弧常爲對先用所知角不知之邊再審所知又一角大於前餘角則後餘角卽爲不知之角後對弧與前下弧相加爲對所知又一角不知之邊若所知又一角小於前餘角則後餘角之外角爲不知之角後對弧與前下弧相減餘爲對所知又一角不知之邊一所知一角在所知兩邊之間法以所知角爲交角先任以所知一邊爲上弧用正弧三角法求得下弧對弧餘角三件以所知又一邊與此下弧相減餘又爲對弧前對弧爲下弧用正弧三角法求得交角上弧餘角三件後所求得之上弧常爲不知之邊再審所知又一邊大於前
