body:
  text: 此形之倍句乘彼形之倍句兩形之倍句皆為句𢎺和中減去句𢎺較之數即一為三率中減去首率之數一為三率中減去末率之數兩數相乘即有一中率自乘之方一首率乘中率長方一首率乘末率長方同於中率自乘之方一末率乘中率長方皆以中率齊之則以中率為闊以三率併數為帶縱矣又準前論既以中率為高則恰成中率自乘為底三率併數為帶縱之長立方故四倍句股積自乘句𢎺和除之為帶縱長立方積以句𢎺和為所帶之縱求得中率也以此中率與句𢎺和三率併數相減自餘首末二率併數中率自乘之數即同首末二率相乘之數以此數為帶縱平方積自合以首末二率併數為長闊和故以中率自乘為帶縱平方積
