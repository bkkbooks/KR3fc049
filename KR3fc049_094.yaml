body:
  text: 度也此度既等五分之一而其餘兩角半徑與五分之一通弴所夾之一角小形既與大形共之則小形之又一角亦不得不等於大形凡大小兩三角形二角等者三角必等且三邊之比例必等所謂同式形也今大形夾五分之一之角為相等之兩半徑則小形夾五分之一之角有不為相等之兩邊乎此五分之三通弴為半徑所截者兩旁兩截必與五分之一通弴相等也至其中一截與所當五分之一通弴平行同為兩半徑所夾而較五分之一通弴為近於圓心自小於五分之一通弴試由五分之三中一分通弴之一端與又一端之半徑作平行線以截五分之三之通弴則兩線之間所截者必與五分之一通弴等蓋五分之三通弴既與五分之三中一分之通弴平行今一端所作之線又與又一端之半徑平行凡四邊形四線兩兩平行者必兩兩相等勢也又試以半徑為一率五分之一通弴為二率則半徑為五分之三通弴
