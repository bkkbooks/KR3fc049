body:
  text: 倍句句𢎺較乘句𢎺和開方得股是句𢎺和為三率併數之象兩積相等之兩句𢎺較為首率與末率之象兩積相等之兩倍句為首中併數及中末併數之象兩積相等兩句𢎺較之併數與句𢎺和相減餘必為中率之象兩積相等之兩股一為首率與三率併數相乘開方之象一為末率與三率併數相乘開方之象而首率所得之股其倍句必為中末二率末率所得之股其倍句必為中首二率於四率斷比例中皆為斜對然後相乘之積必等矣故句𢎺和中截此形句𢎺較為首率其餘倍句為中末併數以首率乘中末併數有一首率乘中率長方有一首率乘末率長方同於中率自乘之方兩方相就成中率為闊首率為帶縱之長方矣故以此形句𢎺較乘倍句為帶縱平方積句𢎺較為所帶之縱用帶縱平方法開得闊根即為兩積相等兩句𢎺較之中率以減倍句得末率即為彼形之句𢎺較也
