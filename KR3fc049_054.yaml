body:
  text: 又以兩形之股相乘為高蓋此積本以倍句與股相乘為一乘又以倍句與股相乘之數乘之為再乘此再乘中即可分作倍句為再乘股為三乘而凡三次之乘或此先而彼後或彼先而此後無不可故即可視作倍句自乘為一乘股為再乘復為三乘而此兩形之句股原可互用故即可視作兩形之倍句相乘為底兩形之股相乘為高又凡句𢎺和開方得根之數與句𢎺較開方得根之數相乘即得股數今此四倍句股積自乘之立體既視作兩形之股相乘為高若以句𢎺和除之即如以句𢎺和之根除過二次而此形即變為兩句𢎺較各開方之根數相乘為高矣準前論句𢎺和為三率併數兩形句𢎺較為首末二率今此形以兩句𢎺較之根相乘為高即是以首末二率之根相乘為高夫首末二率之根相乘即中率也又準前論句𢎺和為三率併數兩句𢎺較為首末二率今此形之底原以
