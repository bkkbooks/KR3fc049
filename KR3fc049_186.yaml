body:
  text: 為何度第半徑既立可通為一法也夫借根而至於有幾根少一二乘方與幾真數相等以其真數自乘其形即變為帶縱立方而幾根數即當其高闊和則有兩高數相淆故第五冊之目列在根數不可知之條而今之法何以能斷其為末率乎蓋所有之根數本平方數也本以一率半徑自乘又三乘之之數也所少之二乘方本三乘方也則為二率之數自乘之平方數也三分之一之度之通弴以為二率必不多於半徑一率之數則以所少之平方數較原有之平方數必不及三分之一遞降而下所少一二乘方之根數必不及原有之根數三分之一夫原有之根數帶縱立方之高濶和也所少一二乘方之根數帶縱立方之所以為高也帶縱立方而以不及高濶和三分之一之數為高必為末率之高可知也論曰善用法者能使無用為有用帶縱和立方之法無用者也而可以為有用其在學者之善
