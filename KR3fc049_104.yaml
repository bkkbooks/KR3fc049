body:
  text: 分之一通弴之數於是知以半徑為一率五分之一通弴為二率則五全分之通弴為五分之一通弴之五倍而少五四率多一六率五分五全分之通弴較五分之一通弴少一四率多六率五分之一也乃以五全分通弴五分之一為第一數二率為第二數四率為第三數六率五分之一為第四數既加既減以合五全分通弴五分之一者為第五數借空求實斷遠取近不煩言而解也論曰五分之三通弴為五分之一通弴之三倍而少一四率西士三分取一法中已備發之右解復縷陳之者為為新法之所借端不得不暢其旨也作八線者增此一法而纖微之真數畢得至由是而通變之又可得七分取一等法未反之隅以俟後之君子
