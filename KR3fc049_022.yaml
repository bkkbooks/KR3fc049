body:
  text: 原角鋭分邊大此邊大又以分邊之正弦為一率前下弧之正弦為二率原所知角之切線為三率求得四率為對先用邊不知之角切線鋭鈍定例原角鈍又一邊大於前下弧此角鈍原角鈍又一邊小於前下弧此角鋭原角鋭又一邊小於前下弧此角鈍原角鋭又一邊大於前下弧此角鋭乃以所得對先用邊之角為交角所知又一邊為上弧用正弧三角法求得下弧置之又以對原所知角之邊正弦為一率原所知角之正弦為二率所知又一邊之正弦為三率求得四率為對所知又一邊不知之角正弦鋭鈍定例對先用邊角鈍對原角之邊大於後下弧此角鈍對先用邊角鈍對原角之邊小於後下弧此
