body:
  text: 含比例連三率兩弦較當首末二率而連三率之理末率不及三率併數三分之一者首率必過三率併數三分之一股弦較之法則必在股弦和十二分有奇之二有奇以下斷不及股弦和三分之一故首末二率其一為股弦較者其一必為句弦較三率併數此形為股弦和者等積之彼形必為句弦和不至有兩積相等兩股弦和相等之相淆而凡句弦和與句股積遇有求得闊根變為股弦較者亦不至有兩積相等兩句弦和相等之互易矣又前法既以長闊二根得首末二率則股弦較不及三率併數三分之一者必當闊根故以闊根得股弦較也有帶縱長立方高闊和帶縱長立方積求高闊兩數法曰如前兩帶縱扁立方等積等高闊和法求得長根為高以高減高闊和為闊解曰等積等高闊和之兩帶縱立方形兩高數恆為首末二率高闊和恆為三率併數與等積
