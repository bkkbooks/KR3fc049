body:
  text: 一通弴等亦由四邊形兩兩平行勢如此也而次設三角形之底即截此又一端之半徑所成原與後作之平行線平行而其兩要之餘線又分抵於平行線之兩端即成同式後設大三角形而此作平行線之一端原有抵圜心之半徑即截後設大三角形內成小三角形此形半徑截於五全分通弴者原與又一端之半徑截於五全分通弴者等又一端之半徑截於五全分通弴者原與後作平行線等是此形兩要相等與大三角形同矣夫兩要相等形中易底為要復截成兩要相等之形必與大形同式是此形為後設同式小三角形試以後設大三角形之要當前設之二率則後設小三角形之要當前之三率而其底當前之四率而後設大三角形之要即五分之三通弴原為前設二率之三倍而少一四率則後設小三角形之底當前之四率者即為前四率之三倍而少一六率而後設小三角形之底即五全分通弴中一截少於五
