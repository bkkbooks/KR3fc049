body:
  text: 一通弴等亦由四邊形兩兩平行勢如此也而次設三角形之底卽截此又一端之半徑所成原與後作之平行綫平行而其兩要之餘綫又分抵於平行綫之兩端卽成同式後設大三角形而此作平行綫之一端原有抵圜心之半徑卽截後設大三角形內成小三角形此形半徑截於五全分通弴者原與又一端之半徑截於五全分通弴者等又一端之半徑截於五全分通弴者原與後作平行綫等是此形兩要相等與大三角形同矣夫兩要相等形中易底爲要復截成兩要相等之形必與大形同式是此形爲後設同式小三角形試以後設大三角形之要當前設之二率則後設小三角形之要當前之三率而其底當前之四率而後設大三角形之要卽五分之三通弴原爲前設二率之三倍而少一四率則後設小三角形之底當前之四率者卽爲前四率之三倍而少一六率而後設小三角形之底卽五全分通弴中一截少於五
