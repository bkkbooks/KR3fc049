body:
  text: 加減爲對所知又一角不知之邊又以前餘角之正𢎺爲一率先用角之餘𢎺爲二率分角之正𢎺爲三率求得四率爲不知之角餘𢎺銳鈍定例先用角鈍所知又一角大於前餘角此角鈍先用角鈍所知又一角小於前餘角此角銳先用角銳所知又一角大於前餘角此角銳先用角銳所知又一角小於前餘角此角鈍一所知一角在所知兩邊之間法以所知角爲交角先任以所知一邊爲上弧用正弧三角法求得下弧以所知又一邊與此下弧相減餘爲分邊乃以前下弧之餘𢎺爲一率先用邊之餘𢎺爲二率分邊之餘𢎺爲三率求得四率爲不知之邊餘𢎺大小定例原角鈍分邊大此邊小原角鈍分邊小此邊大原角銳分邊小此邊小
