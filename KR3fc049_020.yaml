body:
  text: 加減為對所知又一角不知之邊又以前餘角之正弦為一率先用角之餘弦為二率分角之正弦為三率求得四率為不知之角餘弦鋭鈍定例先用角鈍所知又一角大於前餘角此角鈍先用角鈍所知又一角小於前餘角此角鋭先用角鋭所知又一角大於前餘角此角鋭先用角鋭所知又一角小於前餘角此角鈍一所知一角在所知兩邊之間法以所知角為交角先任以所知一邊為上弧用正弧三角法求得下弧以所知又一邊與此下弧相減餘為分邊乃以前下弧之餘弦為一率先用邊之餘弦為二率分邊之餘弦為三率求得四率為不知之邊餘弦大小定例原角鈍分邊大此邊小原角鈍分邊小此邊大原角鋭分邊小此邊小
