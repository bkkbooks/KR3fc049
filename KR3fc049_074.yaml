body:
  text: 更減者也有兩句𢎺和相等有此形之句𢎺較求等積兩句股形彼形之句𢎺較及兩形相等之積一句𢎺和一股𢎺和相等法同法曰此形句𢎺較與句𢎺和相減餘為此形之倍句倍句與句𢎺較相乘為帶縱平方積句𢎺較為所帶之縱用帶縱平方法開之得闊邊為兩形兩句𢎺較之中率此形倍句減去中率即得彼形句𢎺較兩較各與句𢎺和求得句股𢎺諸數其句股相乘折半之積必等解曰凡三率連比例併數以首率乘之開方得根別以末率乘之開方得根兩根之比例必與首中併數中末併數兩數之比例等是成四率斷比例何以知之凡此兩方積與彼兩方積成比例則此兩方根與彼兩方根亦成比例
