body:
  text: 更減者也有兩句弦和相等有此形之句弦較求等積兩句股形彼形之句弦較及兩形相等之積一句弦和一股弦和相等法同法曰此形句弦較與句弦和相減餘為此形之倍句倍句與句弦較相乘為帶縱平方積句弦較為所帶之縱用帶縱平方法開之得闊邊為兩形兩句弦較之中率此形倍句減去中率即得彼形句弦較兩較各與句弦和求得句股弦諸數其句股相乘折半之積必等解曰凡三率連比例併數以首率乘之開方得根別以末率乘之開方得根兩根之比例必與首中併數中末併數兩數之比例等是成四率斷比例何以知之凡此兩方積與彼兩方積成比例則此兩方根與彼兩方根亦成比例
