body:
  text: 兩句𢎺較相併與句𢎺和相減之餘數必為中率句𢎺和必為三率併數此等積等句𢎺和得有兩形之故也詳後有此形之句𢎺較求彼形之句𢎺較法又凡一句股積必以句為一邊以股為一邊相乘折半得數若四倍之即是以兩句相併為一邊以股為一邊相乘長方之積也今有兩句股形之積相等則是此形之句倍之為一邊以此形之股為又一邊可也以彼形之句倍之為一邊彼形之股為又一邊可也若以四倍之積自乘之則即可視作此形之倍句乘彼形之倍句為底
