body:
  text: 兩句𢎺較相併與句𢎺和相減之餘數必爲中率句𢎺和必爲三率併數此等積等句𢎺和得有兩形之故也詳後有此形之句𢎺較求彼形之句𢎺較法又凡一句股積必以句爲一邊以股爲一邊相椉折半得數若四倍之卽是以兩句相併爲一邊以股爲一邊相椉長方之積也今有兩句股形之積相等則是此形之句倍之爲一邊以此形之股爲又一邊可也以彼形之句倍之爲一邊彼形之股爲又一邊可也若以四倍之積自椉之則卽可視作此形之倍句椉彼形之倍句爲底
