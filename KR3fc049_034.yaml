body:
  text: 次依丙角度作丙角用二圜一作丙辛上下曲弧虛交於甲丁弧上一作亢戌橫距角度隨之又用二圜作卯丑辰午丑寅十字對乙交角界之又數乙壬得九十度即用一圜作卯辰上曲弧就之視子壬適得乙外角度即繪為真形不合則遷就之取次形知布三角則次形明矣此形若取三外角即應丑申酉次形如前圖以甲角庚已減半周得戊庚應丑酉次形邊丙角亥戌減半周得亢亥應丑申次形邊乙角壬癸減半周得癸未應申酉次形邊何以審之試側置前圖先明甲角甲庚弧之交戊已弧成十字
  hash: sha256:940042b4580e32fdad2e304c8fdc144af62a866e633a6cf7aa02a9bfd8d955b6
