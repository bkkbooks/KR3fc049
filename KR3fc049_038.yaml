body:
  text: 從庚數到丑得丙角度即從丑與庚已平行作丑寅虛距等線界之乃用一圜作辛甲壬上曲弧就之視丙卯適足九十度即繪為真形取次形此形任取連丙角之丙已壬為次形丙角與本形同巳角與甲角同乙角減象限即得已壬邊或取連乙角之乙午未為次形乙角與本形同午角與甲角同丙角減象限即得午未邊論曰凡三邊弧相交上下同具四形三角弧相交上下亦皆四形三邊弧三角弧互交成三角四角各種形正弧邊角互用取其連本形交角之三角形為次形但除正角外以一角為交角一角加減象限為對弧即得次形矣若斜弧則惟於三角弧相交八形取之但用三外角或兩內角一外角則上下各有一形之三邊應之也即如前圖甲乙丙三角臚列已詳若設甲乙辛三角則三外角之應為丑申土次形其餘三次形為兩內角一外角相應之三形設辛乙丁三
