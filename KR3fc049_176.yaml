body:
  text: 積以幾二乘方數除幾一乘方數又爲帶縱平方長闊較帶縱平方法開之得長根爲每根之一數以幾二乘方數除中率爲積所得一數爲法除之得每根之又一數若中率少於根數以中率自乘數反減方法餘爲帶縱平方積中率減根數餘爲帶縱平方長闊較帶縱平方法開之得長根以幾二乘方數除之又爲帶縱平方積以幾二乘方數除幾一乘方數又爲帶縱平方長闊較帶縱平方法開之得長根爲每根之一數以幾二乘方數除中率爲積所得一數爲法除之得每根之又一數或中率與根數恰合以中率自乘數反減方法餘爲積一乘方法開之得根以幾二乘方數除之爲帶縱平方積以幾二乘方數除幾一乘方數爲帶縱平方長闊較帶縱平方法開之得長根爲每根之一數以幾二乘方數除中率爲積所得一數爲法除之得每根之又一數其中率自乘數多於方法者
