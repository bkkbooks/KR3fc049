body:
  text: 積以幾二乘方數除幾一乘方數又為帶縱平方長闊較帶縱平方法開之得長根為每根之一數以幾二乘方數除中率為積所得一數為法除之得每根之又一數若中率少於根數以中率自乘數反減方法餘為帶縱平方積中率減根數餘為帶縱平方長闊較帶縱平方法開之得長根以幾二乘方數除之又為帶縱平方積以幾二乘方數除幾一乘方數又為帶縱平方長闊較帶縱平方法開之得長根為每根之一數以幾二乘方數除中率為積所得一數為法除之得每根之又一數或中率與根數恰合以中率自乘數反減方法餘為積一乘方法開之得根以幾二乘方數除之為帶縱平方積以幾二乘方數除幾一乘方數為帶縱平方長闊較帶縱平方法開之得長根為每根之一數以幾二乘方數除中率為積所得一數為法除之得每根之又一數其中率自乘數多於方法者
