body:
  text: 算師思精算弟子之詣舍多設題以難之無由也弧三角之算窮形固難設形亦難稍不經意動乖其方但值握籌茫然先虞發策窘矣已未之夏吾宗岫雲出遊欲構難題數端往詰算博士因為制此條目舊著遞兼數理亦設問之奇者也合為一册以廣贈算師歙汪萊
