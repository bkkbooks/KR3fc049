body:
  text: 之各為每根之數以計原真數皆合其實每根之數不可知一有幾真數少幾二乘方積與幾一乘方積相等可知同第八一有幾根積多幾真數與幾一乘方積相等可知同第一一有幾根積少幾真數與幾一乘方積相等不可知同第五一有幾根積多幾真數與幾二乘方積相等可知同第三一有幾根積少幾真數與幾二乘方積相等不可知同第九一有幾根積多幾一乘方積與幾真數相等可知同第二一有幾根積少幾一乘方積與幾真數相等不可知同第五一有幾根積多幾一乘方積與幾二乘方積相等左右降位命為幾真數多幾根積與幾一
