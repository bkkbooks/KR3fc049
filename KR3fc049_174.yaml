body:
  text: 數即為每一根可知之數而無相淆者矣第五十五條小變之術中率自乘數減方法恰盡者視中率少於根數即以減餘數用幾二乘方數除之為帶縱平方積以幾二乘方數除幾一乘方數為帶縱平方長闊較帶縱平方法開之得長根為每根之一數以幾二乘方數除中率為積所得一數為法除之得每根之又一數若中率多於根數即以根數用幾二乘方數除之為積一乘方法開之得每根之一數以幾二乘方數除中率為積所得一數為法除之得每根之又一數或中率與根數恰合則以幾二乘方數除中率為積一乘方法開之即得每根之數而無相淆之又一數其中率自乘數少於方法者視中率多於根數以中率自乘數反減方法餘為帶縱平方積根數反減中率餘為帶縱平方長闊較帶縱平方法開之得闊根以幾二乘方數除之又為帶縱平方
