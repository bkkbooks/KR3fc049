body:
  text: 數卽爲每一根可知之數而無相淆者矣第五十五條小變之術中率自乘數減方法恰盡者視中率少於根數卽以減餘數用幾二乘方數除之爲帶縱平方積以幾二乘方數除幾一乘方數爲帶縱平方長闊較帶縱平方法開之得長根爲每根之一數以幾二乘方數除中率爲積所得一數爲法除之得每根之又一數若中率多於根數卽以根數用幾二乘方數除之爲積一乘方法開之得每根之一數以幾二乘方數除中率爲積所得一數爲法除之得每根之又一數或中率與根數恰合則以幾二乘方數除中率爲積一乘方法開之卽得每根之數而無相淆之又一數其中率自乘數少於方法者視中率多於根數以中率自乘數反減方法餘爲帶縱平方積根數反減中率餘爲帶縱平方長闊較帶縱平方法開之得闊根以幾二乘方數除之又爲帶縱平方
