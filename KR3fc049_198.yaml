body:
  text: 克竟其奧年來殆更進一解已第五冊算書焦記豫幼好九九之學雖求之古書而不能得其指歸自交吳中李尚之鋭歙縣汪孝嬰萊得兩君切磋之益于此藝少有進而兩君亦時時以所得見示令商論其可否是時李仁卿秦道古之書兩君均未之見也歲乙犯余在浙始得見益古演偭沿圓海鏡兩書急寄尚之尚之嘉甚為之疏通證明復推其術于弧矢著書以明郭太史授時草所用天元一術已而豫又得秦氏所為數學大略亦撰為天元一釋開方通釋以述兩家之學諛申冬與尚之同客武林節署中互相證訂喜古人絶學復續于今日明年孝嬰來揚州因以語之壬戌春豫在京師孝嬰自六安寄一書來甚言秦李兩家之非而剖析其可知不可知衡齊算學中第五冊是也是秋豫復在浙尚之寓于孤山買舟訪之以孝嬰之書與相參核尚之深嘆為精善復以兩日之力作開方
