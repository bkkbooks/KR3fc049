body:
  text: 克竟其奥年來殆更進一解已第五冊算書焦記予幼好九九之學雖求之古書而不能得其指歸自交吳中李尚之銳歙縣汪孝嬰萊得兩君切磋之益于此藝少有進而兩君亦時時以所得見示令商論其可否是時李仁卿秦道古之書兩君均未之見也歲乙犯余在浙始得見益古演偭沿圓海鏡兩書急寄尚之尚之嘉甚爲之疏通証明復推其術于弧矢著書以明郭太史授時草所用天元一術已而予又得秦氏所爲數學大略亦撰爲天元一釋開方通釋以述兩家之學諛申冬與尚之同客武林節署中互相證訂喜古人絕學復續于今日明年孝嬰來揚州因以語之壬戌春予在京師孝嬰自六安寄一書來甚言秦李兩家之非而剖析其可知不可知衡齋算學中第五冊是也是秋予復在浙尚之寓于孤山買舟訪之以孝嬰之書與相參核尚之深嘆爲精善復以兩日之力作開方
