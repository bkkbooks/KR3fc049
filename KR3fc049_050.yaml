body:
  text: 歙汪萊者句股形帶縱立方形附有兩積相等兩句𢎺和相等求兩句股形各數一句𢎺和一股𢎺和相等法同法曰四倍句股積自椉句𢎺和除之得數爲帶縱長立方積以句𢎺和爲所帶之縱用帶縱長立方法開之得本方根數爲兩句股形中兩句𢎺較之中率以中率自椉得數爲帶縱平方積又以中率與句𢎺和相減得數爲帶縱平方長闊和用帶縱平方長闊和法開之得長闊兩根爲兩句股形中兩句𢎺較數再用句𢎺較與句𢎺和求句股𢎺法卽得兩句股形各數解曰凡一句𢎺和任設一句𢎺較求得句股積必有又一句𢎺較所求之句股積與之相等或一股𢎺較所求句股積與之相等則句𢎺和變股𢎺和法同葢兩句𢎺較兩數及兩句𢎺較相併與句𢎺和相減之餘數必爲連比例之三率兩句𢎺較兩數必爲首末二率
