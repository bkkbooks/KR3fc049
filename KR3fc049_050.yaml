body:
  text: 歙汪萊者句股形帶縱立方形附有兩積相等兩句弦和相等求兩句股形各數一句弦和一股弦和相等法同法曰四倍句股積自乘句弦和除之得數為帶縱長立方積以句弦和為所帶之縱用帶縱長立方法開之得本方根數為兩句股形中兩句弦較之中率以中率自乘得數為帶縱平方積又以中率與句弦和相減得數為帶縱平方長闊和用帶縱平方長闊和法開之得長闊兩根為兩句股形中兩句弦較數再用句弦較與句弦和求句股弦法即得兩句股形各數解曰凡一句弦和任設一句弦較求得句股積必有又一句弦較所求之句股積與之相等或一股弦較所求句股積與之相等則句弦和變股弦和法同蓋兩句弦較兩數及兩句弦較相併與句弦和相減之餘數必為連比例之三率兩句弦較兩數必為首末二率
