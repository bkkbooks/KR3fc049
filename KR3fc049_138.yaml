body:
  text: 一有幾眞數少幾一乘方積與幾二乘方積相等以幾一乘方數爲帶縱長立方高濶較以幾二乘方數自乘乘幾眞數爲帶縱長立方積帶縱長立方法開之得濶根以幾二乘方數除之每根之數可知一有幾眞數多幾二乘方積與幾根積相等以幾根數爲帶縱立方高濶和以幾眞數自乘又以幾二乘方數乘之爲帶縱立方積用第二冊內帶縱立方高濶和法求得首末二率兩高各以幾二乘方數除之得數以一乘方法開之各爲每根之數以計原眞數皆合其實每根之數不可知一有幾眞數少幾二乘方積與幾根積相等可知同第四一有幾眞數多幾二乘方積與幾一乘方積相等以幾一乘方數爲帶縱立方高濶和以幾三乘方數自乘乘幾眞數爲帶縱立方積用第二冊內帶縱立方高濶和法求得首率幷中率末率並中率兩濶各以幾二乘方數除
