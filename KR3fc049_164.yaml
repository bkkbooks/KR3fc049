body:
  text: 一有幾一乘方積少幾真數又多幾二乘方積與幾根積相等可知同第五十一有幾一乘方積少幾真數又少幾二乘方積與幾根積相等不可知同第五十三一有幾一乘方積多幾根積又多幾二乘方積與幾真數相等可知同第五十二一有幾一乘方積多幾根積又少幾二乘方積與幾真數相等不可知同第五十五一有幾一乘方積少幾根積又多幾二乘方積與幾真數相等可知同第五十一有幾一乘方積少幾根積又少幾二乘方積與幾真數相等不可知同第五十三一有幾二乘方積多幾真數又多幾根積與幾一乘方積相等不可知同第五十三一有幾二乘方積多幾真數又少幾根積與幾一乘方積相等不可知同第五十五一有幾二乘方積少幾真數又多幾根積與幾一乘方積相等可知不可知並同第五十一
