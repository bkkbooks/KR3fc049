body:
  text: 爻皆變問變卦共幾何及諸幾何爻變之卦各幾何法以六爻減一數得五爲倍根之次數乃以一爲根第一次倍之加一得三第二次倍之加一得七第三次倍之加一得十五第四次倍之加一得三十一第五次倍之加一得六十三計變卦共六十三卦又以六爻之數卽爲一爻變之卦數五爻變之卦數同以六爻減一數得五爲平三角堆之根用平三角堆法推得積數十五卽爲兩爻變之卦數四爻變之卦數同以前根數減一得四爲立三角堆之根用立三角堆法推得積數二十卽爲三爻變之卦數六爻合并得一卽爲六爻皆變之卦數三角堆求積通法凡平三角堆以根數加一與根數相乘折半得積數立三角堆以根數加一與根數相乘又以根數加二乘之得數六歸之得積數此定法也至三乘以上則未有其術故立爲通法法取根數用一二三四五六七八九十以至百
