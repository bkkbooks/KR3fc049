body:
  text: 遂求黃赤之交變尋弧角之比例除總較法不便用對數外試以邊角相求之法按其銳鈍大小則窮又試以垂弧法推次形又次形紛紛葛藤不可收拾至按其銳鈍大小亦窮乃屛弃成言𣺌慮静觀始覺象數俱顯因錄爲條目幷通法定便各種取曩在吳門所論次形數紙合爲一冊孟嘉一見爲之鼓掌余嘗攷垂弧法有梅氏形內異類則垂弧在形外由今按之確不可易攷次形法有梅氏所引𠩵學會通之説謂别算一三角其邊爲此角一百八十度之餘由今按之無不可通梅氏皆斥之甚矣索解人之難也若此冊得孟嘉可無憾已雖然持戒者言仰觀星宿推步盈虛𠩵數算計皆所不應孟嘉其何以解我歙汪萊
  hash: sha256:5dab45f24b0ace59e164ded2f22c72690616fe0c0ec6a78d60b1bada136f5fd6
