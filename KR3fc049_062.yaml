body:
  text: 視作倍句自乘為底股自乘為高然句𢎺和與句𢎺較相乘即如股自乘之數則就句𢎺和既除之後觀之即可視作倍句自乘為底句𢎺較為高夫此倍句視作首中二率則句𢎺較必為末率此倍句視作中末二率則句𢎺較必為首率若以末率自乘再乘為隅倍首中二率乘末率自乘之數為兩廉加入倍句自乘為底句𢎺較為高之積即成三率併數自乘為底末率為高之積三率併數之句𢎺和自乘得數除之必得末率之句𢎺較矣或以首率自乘再乘為隅倍中末二率乘首率自乘之數為兩廉加八倍句自乘為底句𢎺較為高之積即成三率併數自乘為底首率為高之積三率併數之句𢎺和自乘得數除之必得首率之句𢎺較矣而今所得長闊二
