body:
  text: 中率與句𢎺和相減餘為長闊和用帶縱平方長闊和法求得長闊二根為首末二率亦即為兩形之兩句𢎺較也中率有奇零求兩句𢎺較密數法曰凡中率以帶縱立方開之得數遇有奇零不盡者不得不截其餘以求得帶縱平方長闊二根為首末二率必有微差長根恆失之多闊根恆失之少用益實歸除法則可得其密數以前所得長根之數先就首位減去一數用其餘數為減過長根之數自乘得積又用句𢎺和倍之減去減過長根之數用其餘數以乘前自乘之積得數加入前帶縱立方積為實句𢎺和自乘之數為法除之視其得數較減過長根之數恰合則即為密數矣若多則更當減少則不可減更當減則又減一數如前法求之如前法視之不可減則還其本數待次位之減次位三位以下若有多位皆如前法定之求闊根以前所得之數先就首位加一數為加過闊根之數自
