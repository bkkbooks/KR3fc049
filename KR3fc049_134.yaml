body:
  text: 歙汪萊著一乘方二乘方形根方多少糅雜每根之數知不知條目一有幾真數多幾根積與幾一乘方積相等以幾根數為帶縱平方長濶較以幾一乘方數乘幾真數為帶縱平方積帶縱平方法開之得長根以幾一乘方數除之每根之數可知一有幾真數少幾根積與幾一乘方積相等以幾根數為帶縱平方長闊較以幾一乘方數乘幾真數為帶縱平方積帶縱平方法開之得闊根以幾一乘方數除之每根之數可知一有幾真數多幾根積與幾二乘方積相等以幾根數為帶縱長立方高闊較以幾真數自乘又以幾二乘方數乘之為帶縱長立方積帶縱長立方法開之得高根以幾二乘方數除之得數以一乘方法開之每根之數可知冊內帶縱立方言闊皆底數四邊等者言高即高數與底不等者
