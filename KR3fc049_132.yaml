body:
  text: 以不知為知不可也而猶可也以不可知為知大不可也何可乎以不知為知何不可乎以不可知為知物豫我以知我暫不知會心焉有待也物不任我以知我謬附以知見魔焉迷不反也嗟乎使物有知不且笑知已乎故曰知其不可知知也辛酉仲秋吾友江鄭堂畢子廉相將為𨝍水之遊湖上杯間發我知者何限未幾巾車遊南嶽臨別之頃與鄭堂察秦九韶開方術及李冶天元一術多以不可知為知者遂就二乘方以下簡且易者略為條目以正之首録一册寄吾友焦理堂理堂其樂道豫之知歟末不亦樂乎豫之不知也歙汪萊
  hash: sha256:3f8d9d9adb598afa1e77c889af868036b32b503c11ecd5cb87309d74124d1eb2
