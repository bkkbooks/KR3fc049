body:
  text: 一乘方積相等可知同第五十一有幾真數少幾根積又多幾二乘方積與幾一乘方積相等以幾根數為中率之帶縱長立方高濶較以幾真數乘幾一乘方數為減方法以幾真數自乘乘幾二乘方數為帶縱長立方積帶縱長立方有減方法開之得闊根為中率中率與幾根數相減餘為帶縱平方長濶和中率自乘得數減去方法餘為帶縱平方積帶縱平方長濶和法開之得長濶兩根各以幾二乘方數除之得數又為帶縱平方積以幾二乘方數除幾一乘方數又為帶縱平方長濶較帶縱平方法開之各得長根為每根之數以計原真數皆合其實每根之數不可知或中率多於根數中率自乘數少於方法立術皆合小變而不可知則同一有幾真數少幾根積又少幾二乘方積與幾一乘方積相等可知同第五十二一有幾真數多幾一乘方積又多幾二乘方積
