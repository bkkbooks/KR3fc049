body:
  text: 曲矩形乃能合首率爲高中末二率併數自椉爲底之立方積同容於三率併數自椉之方內而立方積之高較之曲矩之高則少首率所多之數取抉出曲矩以首率所多之數爲闊對空立方以首率所多數爲高亦無不合而抉出曲矩四段積之立冪爲首率微多椉末率之長二較空立方冪末率不差椉二中率不差者多矣爲首率微多椉中率之長一較空立方冪中率不差自椉者多矣爲首率微多椉中率微少之長一此段內雖所少之數以首率爲長所多之數以中率微少之數爲長不能相補成首率不差椉中率不差之數而取第三段首率所多之數椉中率之積以補此段中率之所少卽其下截已成中率不差之自椉較空立方冪末率自椉者必多矣夫以抉出曲矩之多補入空立方之少其積亦必浮而出以三率併數自椉之方除之所得之數亦必多於所設之數故反以除得之數多於所設之數定知設數之尙多所當
