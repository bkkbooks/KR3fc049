body:
  text: 十物合并得數一解曰推遞兼之分數用三角堆其説有五一系以一物為主而兼他物得若干數至以又一物為主而兼他物即不復兼先為主之物故所得必少一數由此遞少遂成三角堆形一系以一物為主而兼他物得若干數至以二物為主而兼他物受兼之物已減為主之一故所得必少一數由此遞少故根數遞減一系一物為主而兼他物成一根各物遞減而進成一平三角堆至二物為主則此物與彼物相與為二物以兼他物成一根此物與彼又一物又相與為二物以兼他物又成一根由此遞減而進則一物為主已成平三角堆各物遞減而進遂成立三角堆由此遞進故乘數遞加一系中數之前後其前相兼之數與後不及兼之數等故得數等一系中數在一物各立一數及一物不及兼之中故各物合并之一位不計設如設如筮者求卦每一卦六爻自一爻變以至六
