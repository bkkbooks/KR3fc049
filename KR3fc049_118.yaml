body:
  text: 定限一設一角鈍對一邊足又設一角鋭定小於先設一角之外角一設一角鈍對一邊足又設一角鈍定大於先設一角一設一角正對一邊無論小大又設一角鋭鈍皆無定限一設一角正對一邊足又設一角無定限一凡又設一邊小大無定限者惟先設一邊足對一角或鋭或鈍者不可足餘皆可足一凡又設一角鋭鈍無定限者惟先設一角正對一邊或大或小者不可正餘皆可正遞兼數理遞兼之數古所未發今定推求之則先明設問之條設如有物各種自一物各立一數起至諸物合併共為一數止其間遞以二物相兼為一數交錯以辨得若干數三物相兼為一數交錯以辨得若干數四物五物以至多物莫不皆然
