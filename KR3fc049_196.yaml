body:
  text: 三乘方以上則有恆河沙不可思議無思數相淆者必辨碁為二為三為恆河沙不可思議無量數皆著其求之之法以示後人使不生疑惑則又非例所能括者故余于二乘方以下已煞費苦心而尚之亦不得例也且尚之之第二例亦稍有未當處蓋所謂隅實異名而中間從亷正負相間者即余書之第五十一條也此條有可知有不可知若非先以余法審别之而驟以正負法開方設遇不可知之數如一與一千與一十萬三數相淆而題為一萬萬真數少一萬一十萬一千根積又多一十萬一千一一乘方積與一二乘方積相等者自一至一十萬相去遠矣茫無進退之限初商何以下算實商不能下算何以開方而知其翻為同名與否又況雖翻而不同名亦有可知者如八百真數少一百根積又多一十二一乘方積與一二乘方積相等則每根之數惟十斷無相淆以余補法按之可以得其故矣想尚之作便時愁緒紛拿故未
