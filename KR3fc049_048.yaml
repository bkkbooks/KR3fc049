body:
  text: 憶始晤吾友江蒹浦時蒹浦課以句𢎺和與中容求諸數一題余攷自來算書有梅君循齋及丁君維烈二法認題旣誤布算自乖因思別立正術思緒不來大爲蒹浦所窘戊午春夜與孟嘉雨窗破寂覆拈此題略言其𧼈越日蒹浦自山中讀書來旣見斯編相視而咲想見初相見時歙汪萊
