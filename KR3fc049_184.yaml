body:
  text: 一千萬乘二率一根得一千萬根為二率當之於是又以三率一平方自乘得一三乘方以二率一千萬根除之應得四率不除即命一三乘方為四率轉以二率一千萬根自乘得一百萬萬萬平方當之乃三倍二率減去一四率為三百萬萬萬平方少一三乘方與三全分之通弴之率相等矣而此二率與四率乃用一率半徑乘之又以一率乘二率乘之之數也故取三全分通弴亦以一率半徑一千萬乘之為若干數又以一率半徑乘二率一根所得一千萬根乘之為若干根與前借根數乃相等矣左右俱無真數法宜降位其根數者當降為真數也既後當降為真數則前之以二率根數乘者即命為以真數乘而後不煩降矣故法徑以半徑一千萬自乘得一百萬萬萬乘三全分通弴為真數也其一乘方數者則降為根數三乘方數者則降為二乘方數也於是命為三百萬萬萬根少一二乘方與若干真數相等此不論三全分者
