body:
  text: 椉得積又用句𢎺和倍之減去加過闊根之數用其餘數以椉前自椉之積得數加入前帶縱立方積爲實句𢎺和自椉之數爲法除之視其得數較加過闊根之數恰合則卽爲密數矣若多則更當加少則不可加更當加則又加一數如前法求之如前法視之不可加則還其本數待次位之加次位三位以下若有多位皆以前法定之此一加一減之法皆以中率爲限長根之減不得過中率以下闊根之加不得過中率以上則長闊不至相淆雖有奇零之數皆無慮其不合矣解曰前帶縱立方積本以倍句椉股爲底復以倍句椉股爲高底高相椉句𢎺和除之之數也就句𢎺和未除之先三次之椉互易觀之卽可
