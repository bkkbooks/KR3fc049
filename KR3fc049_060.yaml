body:
  text: 乘得積又用句弦和倍之減去加過闊根之數用其餘數以乘前自乘之積得數加入前帶縱立方積為實句弦和自乘之數為法除之視其得數較加過闊根之數恰合則即為密數矣若多則更當加少則不可加更當加則又加一數如前法求之如前法視之不可加則還其本數待次位之加次位三位以下若有多位皆以前法定之此一加一減之法皆以中率為限長根之減不得過中率以下闊根之加不得過中率以上則長闊不至相淆雖有奇零之數皆無慮其不合矣解曰前帶縱立方積本以倍句乘股為底復以倍句乘股為高底高相乘句弦和除之之數也就句弦和未除之先三次之乘互易觀之即可
