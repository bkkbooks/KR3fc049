body:
  text: 角則三外角之應為丑心土次形其餘三次形為兩內角一外角相應之三形設丁乙丙三角則三外角之應為丑心酉次形其餘三次形為兩內角一外角相應之三形故斜弧無論何形皆可用三外角亦可任用兩內角一外角正弧以一角加減象限為次形對弧定例兩鋭恆置一象限減之兩鈍恆置三象限減之一鋭一鈍用鋭加一象限用鈍減去一象限正弧算法理為求得次形上弧之正𢎺命為本形下弧之餘𢎺法以交角之正𢎺為一率餘角之餘𢎺為二率半徑為三率求得四率為下弧之餘𢎺大小依相從條目定之得下弧再求上弧對弧竝依正弧三角法斜弧算法理為求得次形三角以為本形三邊凡本形之角為次形邊即以其邊所對之角為本形角所
