body:
  text: 方有帶方法開之商數減去高闊較以商數乘之得數加入方法又以商數乘之除積得濶根以幾二乘方數除之每根之數可知若多則或幾一乘方數爲通分法三母摠數幾眞數爲三母維乘之共母幾根數爲通分之共子三數之計原眞數皆合其實每根之數不可知如二與六與十二設一百四十四眞數少一百八根積又多二十一乘方積與一二乘方積相等則三數皆合也一有幾眞數少幾根積又少幾一乘方積與幾二乘方積相等以幾一乘方數爲帶縱長立方高濶較以幾二乘方數乘幾根數爲方法以幾二乘方數自乘乘幾眞數爲帶縱長立方積帶縱長立方有帶方法開之商數竝入高濶較以商數乘之得數加入方法又以商數乘之除積得濶根以幾二乘方數除之每根之數可知一有幾眞數多幾根積又多幾二乘方積與幾一乘方積相等取幾眞數以一乘方法開之爲一根之數與實有幾一乘方數用一乘方法開之之數相乘之積用疊借法以其數用
