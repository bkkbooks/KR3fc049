body:
  text: 歙汪萊著弧三角形弧角比例鋭鈍大小知不知條目對角求對邊一原所知角鋭對邊大又所知角鋭所求對邊恆小一原所知角鋭對邊大又所知角鈍所求對邊恆大一原所知角鋭對邊足九十度與對邊大同一原所知角鋭對邊小又所知角鋭審又所知角小於原所知角則所求對邊小若大於原所知角則不能定一原所知角鋭對邊小又所知角鈍審又所知角之外角小於原所知角則所求對邊大若大於原所知角則不能定一原所知角鈍對邊小又所知角鈍所求對邊恆大
