body:
  text: 長微多微少之數雖恰相同而一長一短之積不足相補則較立方冪之中率自乘同於末率不差乘首率不差之數者又少矣夫以所截立方積之多補入空曲矩之少其積必浮而出以三率併數自乘之方除之所得之數能不多於所設之數乎故以除得之數多於所設之數定知設數之尚少所當更加者也又或原所設之末率微差而多則以所截立方形首末二率相較數之高對空曲矩形首末二率相較數之闊亦無不合而空曲矩形中四段積之立冪為末率微多之數乘中率之長二較立方之冪末率不差之數乘二中率者多矣為末率微多數乘末率長一較立方冪末率不差之數自乘者多矣為末率微多之數乘首率微少之長一而首率之微少僅以末率不差之數為長末率之微多直以首率微少之數過於中率者為長微多微少之數雖恰相同一長一短之積不足相消則較立方冪之中率自乘同於首率不差乘末
