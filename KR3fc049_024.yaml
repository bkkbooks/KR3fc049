body:
  text: 角鋭對先用邊角鋭對原角之邊小於後下弧此角鈍對先用邊角鋭對原角之邊大於後下弧此角鋭一所知兩邊對所知兩角法先任以所知一角為交角對所知又一角之邊為上弧用正弧三角法求其下弧審所知又一角之鋭鈍與先用角相同即以又一角為交角若與先用角不同則以又一角之外角為交角對所知先用角所知之邊為上弧用正弧三角法求得下弧審所知二角鋭鈍相同則前後兩下弧相加若所知二角鋭鈍不同則前後兩下弧相減皆加減為不知之邊復以所知又一角為交角所得之邊為上弧用正弧三角法求其下弧置之又以對先用角之邊正𢎺為一率先用角之正𢎺為二率所得之邊正𢎺為三率求得四率為不知一角之正𢎺
