body:
  text: 角銳對先用邊角銳對原角之邊小於後下弧此角鈍對先用邊角銳對原角之邊大於後下弧此角銳一所知兩邊對所知兩角法先任以所知一角爲交角對所知又一角之邊爲上弧用正弧三角法求其下弧審所知又一角之銳鈍與先用角相同卽以又一角爲交角若與先用角不同則以又一角之外角爲交角對所知先用角所知之邊爲上弧用正弧三角法求得下弧審所知二角銳鈍相同則前後兩下弧相加若所知二角銳鈍不同則前後兩下弧相減皆加減爲不知之邊復以所知又一角爲交角所得之邊爲上弧用正弧三角法求其下弧置之又以對先用角之邊正𢎺爲一率先用角之正𢎺爲二率所得之邊正𢎺爲三率求得四率爲不知一角之正𢎺
