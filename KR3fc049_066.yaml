body:
  text: 較乘首中末中四率併數之曲矩形為底末率為高之積若以末率之數截立方之下體取其上之餘積以補之其高為首末二率之較即合空曲矩形之闊其底冪析之為四形一末自乘合空曲矩之末率高乘末率長二末乘中合空曲矩之末率高乘二中率長一中自乘合空曲矩之末率高乘首率長如此相補適足一末率為高三率併數自乘為底之立方形以三率併數自乘之方除之得末率之數自無多少不合矣而或原所設之末率微差而少則以所截立方形首末二率相較數之高對空曲矩形首末二率相較數之闊亦無不合而空曲矩形中四段積之立冪則為末率微少之數乘中率之長二較立方之冪末率不差之數乘二中率者少矣為末率微少數乘末率長一較立方冪末率不差之數自乘者少矣為末率微少之數乘首率微多之長一而首率之微多僅以末率微少之數為長末率之微少直以首率不差之數為
