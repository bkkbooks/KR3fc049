body:
  text: 較椉首中末中四率併數之曲矩形爲底末率爲高之積若以末率之數截立方之下體取其上之餘積以補之其高爲首末二率之較卽合空曲矩形之闊其底冪析之爲四形一末自椉合空曲矩之末率高椉末率長二末椉中合空曲矩之末率高椉二中率長一中自椉合空曲矩之末率高椉首率長如此相補適足一末率爲高三率併數自椉爲底之立方形以三率併數自椉之方除之得末率之數自無多少不合矣而或原所設之末率微差而少則以所截立方形首末二率相較數之高對空曲矩形首末二率相較數之闊亦無不合而空曲矩形中四段積之立冪則爲末率微少之數椉中率之長二較立方之冪末率不差之數椉二中率者少矣爲末率微少數椉末率長一較立方冪末率不差之數自椉者少矣爲末率微少之數椉首率微多之長一而首率之微多僅以末率微少之數爲長末率之微少直以首率不差之數爲
