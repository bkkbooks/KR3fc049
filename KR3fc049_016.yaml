body:
  text: 下弧則後餘角即為對先用所知邊不知之角後交角與前餘角相加為對所知又一邊不知之角若所知又一邊小於前下弧則後餘角之外角為對先用所知邊不知之角後交角與前餘角相減餘為對所知又一邊不知之角一所知兩邊對所知兩角法先任以所知一角為交角對所知又一角所知之邊為上弧用正弧三角法求得下弧對弧餘角三件又審所知又一角之鋭鈍與先用所知角相同即以所知又一角為交角若所知又一角之鋭鈍與先用所知角不同則以所知又一角之外角為交角前對弧復為對弧所知對先用所知角之邊為上弧用正弧三角法求得下弧餘角二件審所知二角鋭鈍相同以前後兩下弧相加為不知之邊前後兩餘角相加為不知之角若所知二角鋭鈍不同以前後兩下弧相減餘為不知之邊前後兩餘角相減餘為不知之角省算
