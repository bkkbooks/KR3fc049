body:
  text: 率不差之數者又多矣夫以所截立方積之少補入空曲矩之多其積必窳而下以三率併數自乘之方除之所得之數能不少於所設之數乎故以除得之數少於所設之數定知設數之已多所當還其本數者也至於求首率法若減數過多設數微差而少與末率加多之形絲豪無異故反以除得之數少於所設之數定知設數之已少所當還其本數者也其正當首率無差則所益之曲矩形積以首率自乘再乘為隅亦以首率自乘乘倍中末二率併數為兩廉合於中末二率併數自乘為底首率為高之立方積恰成一三率併數自乘為底首率為高之立方積中間始無空曲矩兩高始無不齊不須截彼補此以三率併數自乘之方除之必恰得首率之數亦無多少不合矣然或減數尚少設數微差而多則所益之曲矩形積以首率微多之數為闊亦以首率微多之數為高必須抉出向內首率所多之數為闊首率微多之數為高之
