body:
  text: 爲帶縱平方積前長根加長濶和又爲後長濶和開得濶根以前相乘積九分之四乘之與眞數比眞數少或相等者有眞數多者無一立方正幾平方負幾根正幾眞數正以平方數爲長濶和幾根數爲帶縱平方積不可開則無可開則開得長濶二根取長根與長濶較相乘以九分之五又爲帶縱平方積前長根加長濶較又爲後長濶和開得濶根以前相乘積九分之四乘之與眞數比眞數少或相等者有眞數多者無一立方正幾平方正幾根負幾眞數正以平方數爲長濶較幾根數爲帶縱平方積開得長濶二根取濶根與長濶和相乘以九分之五又爲帶縱平方積前濶根加長濶和又爲後長濶和開得濶根以前相乘積九分之四乘之與眞數比眞數少或相等者有眞數多者無一立方正幾平方負幾根正幾眞數負恒有右除眞數外相連三層若相間三層及相連相
