body:
  text: 為帶縱平方積前長根加長濶和又為後長濶和開得濶根以前相乘積九分之四乘之與真數比真數少或相等者有真數多者無一立方正幾平方負幾根正幾真數正以平方數為長濶和幾根數為帶縱平方積不可開則無可開則開得長濶二根取長根與長濶較相乘以九分之五又為帶縱平方積前長根加長濶較又為後長濶和開得濶根以前相乘積九分之四乘之與真數比真數少或相等者有真數多者無一立方正幾平方正幾根負幾真數正以平方數為長濶較幾根數為帶縱平方積開得長濶二根取濶根與長濶和相乘以九分之五又為帶縱平方積前濶根加長濶和又為後長濶和開得濶根以前相乘積九分之四乘之與真數比真數少或相等者有真數多者無一立方正幾平方負幾根正幾真數負恆有右除真數外相連三層若相間三層及相連相
