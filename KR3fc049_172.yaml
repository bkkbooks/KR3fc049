body:
  text: 相淆亦如前法也其後得真一根之數由原假一根之數較視幾次而得者仍當按理纍次轉減幾次之假一根而後得原真一根之數其以所命幾一乘方數折半為假一根之數以其數自乘與所命幾根數相較而多於幾根數者即以較餘根數為積一乘方法開之得根以此根與假一根之數相加為帶縱長立方高闊較倍此根為廉法此根乘高闊較倍之為方法所命幾真數為帶縱長立方積帶縱長立方有帶廉帶方法開之得高根為真一根之數其求有無三數相淆如前法其以所命幾一乘方數折半為假一根之數以其數自乘與所命幾根數相較而恰合者即以假一根之數為帶縱長立方高闊較所命幾真數為帶縱長立方積帶縱長立方法開之得高根為真一根之數其求有無三數相淆亦如前法又本法以幾一乘方數乘原幾根數時視與原幾真數恰合則幾一乘方
