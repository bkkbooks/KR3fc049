body:
  text: 根為首末二率皆有微差故益實之時必須加減其長恆失之多闊恆失之少者緣中率既截奇零已失之少自乘為帶縱平方積則積亦少及與句𢎺和相減餘為長闊和又失之多積失之少而長闊和失之多則長闊較必失之多而長恆失多闊恆失少矣益實之時失多用減失少用加加減不過中率皆易明也其以除得數恰合加過減過之根為密而多則更加減少則還本數者由相補之積有定限試以長根命為首率闊根命為末率帶縱立方積命為中末二率併數自乘為底首率為高之積觀之設三率併數自乘之方為範以中末二率併數自乘為底首率為高之積置於中末二率併數之方又以末率自乘再乘為隅末率自乘乘倍首中二率併數為兩廉之曲矩形積置於所設範對中末二率併數方角之兩㫄其間必空首末二率之
