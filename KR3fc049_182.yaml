body:
  text: 歙汪萊著平圓形有圓內若干度之通弴求其度三分之一之通弴法曰置所有若干度之通弴以一百萬萬萬乘之得數自乘為帶縱立方積以三百萬萬萬為帶縱立方高濶和用第二册中帶縱立方高闊和法開之得末率之高以一乘方法開之得三分之一之通弴解曰三全分之通弴較三分之一之通弴為三倍而少一半徑為一率三分之一通弴為二率之四率第三册五分取一法中巳暢發西士之旨然西法布算乃用益實歸除而不顯立進退之限推求較難今改用帶縱立方而以末率當之斯顯然易得矣其法之原先借一根為二率一根自乘得一平方以一率半徑一千萬除之應得三率不除即命一平方為三率轉以一率
