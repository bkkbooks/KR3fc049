body:
  text: 方高濶較以幾二乘方數乘幾根數爲減方法以幾二乘方數自乘乘幾眞數爲帶縱扁立方積帶縱扁立方有減方法開之商數減去高闊較以商數乘之得數減去減方法又以商數乘之除積得闊根以幾二乘方數除之每根之數可知一有幾眞數多幾根積又少幾一乘方積與幾二乘方積相等以幾一乘方數爲帶縱長立方高濶較以幾二乘方數乘幾根數爲減方法以幾二乘方數自乘乘幾眞數爲帶縱長立方積帶縱長立方有減方法開之商數竝入高濶較以商數乘之得數減去減方法又以商數乘之除積得闊根以幾二乘方數除之每根之數可知一有幾眞數少幾根積又多幾一乘方積與幾二乘方積相等以幾一乘方數用幾二乘方數除之得數乘幾根數以較幾眞數若少則以幾一乘方數爲帶縱扁立方高闊較以幾二乘方數乘幾根數爲方法以幾二乘方數自乘乘幾眞數爲帶縱扁立方積帶縱扁立
